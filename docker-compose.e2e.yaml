services:
  e2e-medusa-db:
    build:
      context: ./docker/development/postgres
      dockerfile: Dockerfile
    command: ["/usr/local/bin/run-postgres-with-bootstrap.sh"]
    environment:
      POSTGRES_USER: ${DC_POSTGRES_SUPERUSER:-root}
      POSTGRES_PASSWORD: ${DC_POSTGRES_SUPERUSER_PASSWORD:-root}
      POSTGRES_DB: ${DC_MEDUSA_APP_DB_NAME:-medusa_e2e}
      PGDATA: /var/lib/postgresql/18/docker
      MEDUSA_APP_DB_USER: ${DC_MEDUSA_APP_DB_USER:-medusa_app}
      MEDUSA_APP_DB_PASSWORD: ${DC_MEDUSA_APP_DB_PASSWORD:-medusa_app_change_me}
      MEDUSA_APP_DB_NAME: ${DC_MEDUSA_APP_DB_NAME:-medusa_e2e}
      MEDUSA_APP_DB_SCHEMA: ${DC_MEDUSA_APP_DB_SCHEMA:-medusa_e2e}
      MEDUSA_DEV_DB_USER: ${DC_MEDUSA_DEV_DB_USER:-medusa_dev}
      MEDUSA_DEV_DB_PASSWORD: ${DC_MEDUSA_DEV_DB_PASSWORD:-medusa_dev_change_me}
      PAYLOAD_DB_USER: ${DC_PAYLOAD_DATABASE_USER:-payload}
      PAYLOAD_DB_PASSWORD: ${DC_PAYLOAD_DATABASE_PASSWORD:-payload}
      PAYLOAD_DB_NAME: ${DC_MEDUSA_APP_DB_NAME:-medusa_e2e}
      PAYLOAD_DB_SCHEMA: ${DC_PAYLOAD_DATABASE_SCHEMA_NAME:-payload}
      MEDUSA_DB_ZANE_OPERATOR_USER: ${DC_ZANE_OPERATOR_PGUSER:-zane_operator}
      MEDUSA_DB_ZANE_OPERATOR_PASSWORD: ${DC_ZANE_OPERATOR_PGPASSWORD:-}
      MEDUSA_DB_ZANE_OPERATOR_DB_TEMPLATE_NAME: ${DC_ZANE_OPERATOR_DB_TEMPLATE_NAME:-template_medusa}
    healthcheck:
      test: ["CMD", "/usr/local/bin/postgres-ready-with-bootstrap.sh"]
      start_period: 10s
      interval: 30s
      timeout: 60s
      retries: 3
    networks:
      - internal
    volumes:
      - e2e-medusa-db-data:/var/lib/postgresql

  e2e-medusa-valkey:
    build:
      context: ./docker/development/medusa-valkey
      dockerfile: Dockerfile
    command: ["sh", "-lc", "exec valkey-server --requirepass \"$$VALKEY_PASSWORD\" --appendonly yes"]
    environment:
      VALKEY_PASSWORD: ${DC_VALKEY_PASSWORD:-valkey_dev_change_me}
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a \"$${VALKEY_PASSWORD}\" --no-auth-warning ping | grep -q PONG"]
      start_period: 5s
      timeout: 3s
      interval: 1s
      retries: 5
    networks:
      - internal
    volumes:
      - e2e-medusa-valkey-data:/data

  e2e-medusa-minio:
    build:
      context: ./docker/development/medusa-minio
      dockerfile: Dockerfile
    command: ["server", "/data", "--console-address", ":9003", "--address", ":9004"]
    environment:
      MINIO_ROOT_USER: ${DC_MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${DC_MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_MEDUSA_ACCESS_KEY: ${DC_MINIO_ACCESS_KEY:-medusaappkey}
      MINIO_MEDUSA_SECRET_KEY: ${DC_MINIO_SECRET_KEY:-medusaappsecret_change_me}
      MINIO_MEDUSA_BUCKET: ${DC_MINIO_BUCKET:-medusa-bucket}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/minio/health/live"]
      start_period: 5s
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    volumes:
      - e2e-medusa-minio-data:/data

  e2e-medusa-meilisearch:
    build:
      context: ./docker/development/medusa-meilisearch
      dockerfile: Dockerfile
    environment:
      MEILI_MASTER_KEY: ${DC_MEILISEARCH_MASTER_KEY}
      MEILI_NO_ANALYTICS: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    volumes:
      - e2e-medusa-meilisearch-data:/meili_data

  e2e-medusa-be:
    build:
      context: .
      dockerfile: docker/development/medusa-be/Dockerfile
      target: ci-dev
    depends_on:
      e2e-medusa-db:
        condition: service_healthy
      e2e-medusa-valkey:
        condition: service_healthy
      e2e-medusa-minio:
        condition: service_healthy
      e2e-medusa-meilisearch:
        condition: service_healthy
    environment:
      NODE_ENV: ${DC_NODE_ENV:-development}
      JWT_SECRET: ${DC_JWT_SECRET:-supersecret}
      COOKIE_SECRET: ${DC_COOKIE_SECRET:-supersecret}
      MEDUSA_BACKEND_URL: ${DC_MEDUSA_BACKEND_URL:-http://127.0.0.1:${MEDUSA_E2E_BACKEND_PORT:-19000}}
      STORE_CORS: ${DC_STORE_CORS:-http://127.0.0.1:${MEDUSA_E2E_BACKEND_PORT:-19000}}
      ADMIN_CORS: ${DC_ADMIN_CORS:-http://127.0.0.1:${MEDUSA_E2E_BACKEND_PORT:-19000}}
      AUTH_CORS: ${DC_AUTH_CORS:-http://127.0.0.1:${MEDUSA_E2E_BACKEND_PORT:-19000}}
      SUPERADMIN_EMAIL: ${DC_SUPERADMIN_EMAIL:-}
      SUPERADMIN_PASSWORD: ${DC_SUPERADMIN_PASSWORD:-}
      INITIAL_PUBLISHABLE_KEY_NAME: ${DC_INITIAL_PUBLISHABLE_KEY_NAME:-Storefront Publishable Key}
      DATABASE_TYPE: postgres
      MEDUSA_APP_DB_USER: ${DC_MEDUSA_APP_DB_USER:-medusa_app}
      MEDUSA_APP_DB_PASSWORD: ${DC_MEDUSA_APP_DB_PASSWORD:-medusa_app_change_me}
      MEDUSA_APP_DB_NAME: ${DC_MEDUSA_APP_DB_NAME:-medusa_e2e}
      MEDUSA_APP_DB_SCHEMA: ${DC_MEDUSA_APP_DB_SCHEMA:-medusa_e2e}
      MEDUSA_DATABASE_SCHEMA: ${DC_MEDUSA_APP_DB_SCHEMA:-medusa_e2e}
      DATABASE_SCHEMA: ${DC_MEDUSA_APP_DB_SCHEMA:-medusa_e2e}
      DATABASE_URL: postgresql://${DC_MEDUSA_APP_DB_USER:-medusa_app}:${DC_MEDUSA_APP_DB_PASSWORD:-medusa_app_change_me}@e2e-medusa-db:5432/${DC_MEDUSA_APP_DB_NAME:-medusa_e2e}?sslmode=${DC_POSTGRES_SSLMODE:-disable}&options=-csearch_path%3D${DC_MEDUSA_APP_DB_SCHEMA:-medusa_e2e}%2Cpg_catalog
      LEGACY_DATABASE_URL: ${DC_LEGACY_DATABASE_URL:-}
      REDIS_URL: ${DC_REDIS_URL:-redis://:${DC_VALKEY_PASSWORD:-valkey_dev_change_me}@e2e-medusa-valkey:6379}
      MEILISEARCH_HOST: ${DC_MEILISEARCH_HOST:-http://e2e-medusa-meilisearch:7700}
      MEILISEARCH_API_KEY: ${DC_MEILISEARCH_BACKEND_API_KEY:-}
      MINIO_FILE_URL: ${DC_MINIO_FILE_URL:-http://e2e-medusa-minio:9004/medusa-bucket}
      MINIO_REGION: ${DC_MINIO_REGION:-us-east-1}
      MINIO_ENDPOINT: ${DC_MINIO_ENDPOINT:-http://e2e-medusa-minio:9004/}
      MINIO_BUCKET: ${DC_MINIO_BUCKET:-medusa-bucket}
      MINIO_ACCESS_KEY: ${DC_MINIO_ACCESS_KEY:-medusaappkey}
      MINIO_SECRET_KEY: ${DC_MINIO_SECRET_KEY:-medusaappsecret_change_me}
      SENTRY_NAME: ${DC_SENTRY_NAME:-}
      SENTRY_DSN: ${DC_SENTRY_DSN:-}
      SETTINGS_ENCRYPTION_KEY: ${DC_SETTINGS_ENCRYPTION_KEY}
      FEATURE_PPL_ENABLED: ${DC_FEATURE_PPL_ENABLED:-0}
      PPL_ENVIRONMENT: ${DC_PPL_ENVIRONMENT:-testing}
      NOTIFICATION_PROVIDER: ${DC_MEDUSA_BE_NOTIFICATION_PROVIDER:-local}
      RESEND_API_KEY: ${DC_RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${DC_RESEND_FROM_EMAIL:-}
      RESEND_WEBHOOK_SECRET: ${DC_RESEND_WEBHOOK_SECRET:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - internal
    ports:
      - "127.0.0.1:${MEDUSA_E2E_BACKEND_PORT:-19000}:9000"

networks:
  internal:

volumes:
  e2e-medusa-db-data:
  e2e-medusa-valkey-data:
  e2e-medusa-minio-data:
  e2e-medusa-meilisearch-data:
