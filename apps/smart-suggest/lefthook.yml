pre-commit:
  commands:
    format:
      run: pnpm format
      stage_fixed: true
    lint-fix:
      run: pnpm lint:fix
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    format:
      run: pnpm format:check
    lint:
      run: pnpm lint
    typecheck:
      run: pnpm typecheck
    skills:
      run: pnpm skills:check
    i18n-boundaries:
      run: pnpm i18n:boundaries
    contract:
      run: pnpm contract:check
