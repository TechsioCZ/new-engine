# Shared deploy-input contract for CI, local tooling, and zane-operator.
# This file defines:
# - first-creation secret materialization policy
# - runtime-dependent provisioning providers
#
# Omission defaults:
# - secret.persist_to: zane_env
# - runtime_provider.status: active
# - runtime_provider.materializer: zane_operator
#
# Notes:
# - Keep deploy-policy metadata in this file, not in workflow YAML.
# - Keep service identity in stack-manifest.yaml.
# - Reserved runtime providers may exist here before implementation, but they
#   must stay explicitly inactive until their upstream service contract exists.

secret_materialization:
  secrets:
    - secret_id: preview_jwt_secret
      scope: preview
      lifecycle: random_once
      materializer: ci
      generator:
        kind: random_hex
        bytes: 32
      targets:
        - service_id: medusa-be
          env_var: DC_JWT_SECRET

    - secret_id: preview_cookie_secret
      scope: preview
      lifecycle: random_once
      materializer: ci
      generator:
        kind: random_hex
        bytes: 32
      targets:
        - service_id: medusa-be
          env_var: DC_COOKIE_SECRET

    - secret_id: preview_settings_encryption_key
      scope: preview
      lifecycle: random_once
      materializer: ci
      generator:
        kind: random_hex
        bytes: 32
      targets:
        - service_id: medusa-be
          env_var: DC_SETTINGS_ENCRYPTION_KEY

    - secret_id: preview_superadmin_password
      scope: preview
      lifecycle: random_once
      materializer: ci
      generator:
        kind: random_base64url
        bytes: 24
      targets:
        - service_id: medusa-be
          env_var: DC_SUPERADMIN_PASSWORD

    - secret_id: preview_valkey_password
      scope: preview
      lifecycle: random_once
      materializer: ci
      generator:
        kind: random_base64url
        bytes: 24
      targets:
        - service_id: medusa-valkey
          env_var: DC_VALKEY_PASSWORD
        - service_id: medusa-be
          env_var: DC_VALKEY_PASSWORD

    - secret_id: preview_minio_root_user
      scope: preview
      lifecycle: random_once
      materializer: ci
      generator:
        kind: random_alnum
        length: 16
      targets:
        - service_id: medusa-minio
          env_var: DC_MINIO_ROOT_USER

    - secret_id: preview_minio_root_password
      scope: preview
      lifecycle: random_once
      materializer: ci
      generator:
        kind: random_base64url
        bytes: 24
      targets:
        - service_id: medusa-minio
          env_var: DC_MINIO_ROOT_PASSWORD

    - secret_id: preview_minio_access_key
      scope: preview
      lifecycle: random_once
      materializer: ci
      generator:
        kind: random_alnum
        length: 20
      targets:
        - service_id: medusa-minio
          env_var: DC_MINIO_ACCESS_KEY
        - service_id: medusa-be
          env_var: DC_MINIO_ACCESS_KEY

    - secret_id: preview_minio_secret_key
      scope: preview
      lifecycle: random_once
      materializer: ci
      generator:
        kind: random_base64url
        bytes: 32
      targets:
        - service_id: medusa-minio
          env_var: DC_MINIO_SECRET_KEY
        - service_id: medusa-be
          env_var: DC_MINIO_SECRET_KEY

runtime_providers:
  providers:
    - provider_id: search_credentials
      status: active
      materializer: zane_operator
      source_service_id: medusa-meilisearch
      readiness:
        kind: http_health
        path: /health
      outputs:
        - output_id: backend_key
          output_kind: secret
          target_envs:
            - service_id: medusa-be
              env_var: DC_MEILISEARCH_BACKEND_API_KEY
          policy:
            kind: meilisearch_key
            uid: medusa-backend
            description: Backend API key for server-side search operations
            actions:
              - search
              - documents.get
              - documents.add
              - documents.update
              - documents.delete
              - indexes.create
              - indexes.get
              - indexes.update
              - indexes.swap
              - tasks.get
              - settings.get
              - settings.update
            indexes:
              - products

        - output_id: frontend_key
          output_kind: secret
          target_envs:
            - service_id: n1
              env_var: DC_N1_NEXT_PUBLIC_MEILISEARCH_API_KEY
          policy:
            kind: meilisearch_key
            uid: n1-search
            description: Browser search key for frontend consumers
            actions:
              - search
            indexes:
              - products

    - provider_id: medusa_publishable_key
      status: reserved
      materializer: zane_operator
      source_service_id: medusa-be
      notes:
        - Target contract intentionally inactive until medusa-be exposes a stable runtime provisioning API.
        - Do not infer output shape or consumer mapping before the upstream contract exists.
      outputs: []
