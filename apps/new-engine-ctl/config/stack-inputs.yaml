# Shared deploy-input contract for CI, local tooling, and zane-operator.
# This file defines:
# - first-creation secret materialization policy
# - runtime-dependent provisioning providers
#
# Omission defaults:
# - secret.persist_to: zane_env
# - runtime_provider.status: active
# - runtime_provider.materializer: zane_operator
#
# Notes:
# - Keep deploy-policy metadata in this file, not in workflow YAML.
# - Keep service identity in stack-manifest.yaml.
# - Reserved runtime providers may exist here before implementation, but they
#   must stay explicitly inactive until their upstream service contract exists.

secret_materialization:
  secrets:
    - secret_id: preview_jwt_secret
      scope: preview
      lifecycle: random_once
      materializer: ci
      persist_to: service_env
      generator:
        kind: random_hex
        bytes: 32
      targets:
        - service_id: medusa-be
          env_var: JWT_SECRET

    - secret_id: preview_cookie_secret
      scope: preview
      lifecycle: random_once
      materializer: ci
      persist_to: service_env
      generator:
        kind: random_hex
        bytes: 32
      targets:
        - service_id: medusa-be
          env_var: COOKIE_SECRET

    - secret_id: preview_settings_encryption_key
      scope: preview
      lifecycle: random_once
      materializer: ci
      persist_to: service_env
      generator:
        kind: random_hex
        bytes: 32
      targets:
        - service_id: medusa-be
          env_var: SETTINGS_ENCRYPTION_KEY

    - secret_id: preview_superadmin_password
      scope: preview
      lifecycle: random_once
      materializer: ci
      persist_to: service_env
      generator:
        kind: random_base64url
        bytes: 24
      targets:
        - service_id: medusa-be
          env_var: SUPERADMIN_PASSWORD

    - secret_id: preview_valkey_password
      scope: preview
      lifecycle: random_once
      materializer: ci
      persist_to: zane_env
      persisted_env_var: MEDUSA_VALKEY_PASSWORD
      generator:
        kind: random_base64url
        bytes: 24
      targets:
        - service_id: medusa-valkey
          env_var: DC_VALKEY_PASSWORD
        - service_id: medusa-be
          env_var: DC_VALKEY_PASSWORD

    - secret_id: preview_minio_root_user
      scope: preview
      lifecycle: random_once
      materializer: ci
      persist_to: service_env
      generator:
        kind: random_alnum
        length: 16
      targets:
        - service_id: medusa-minio
          env_var: MINIO_ROOT_USER

    - secret_id: preview_minio_root_password
      scope: preview
      lifecycle: random_once
      materializer: ci
      persist_to: service_env
      generator:
        kind: random_base64url
        bytes: 24
      targets:
        - service_id: medusa-minio
          env_var: MINIO_ROOT_PASSWORD

    - secret_id: preview_minio_access_key
      scope: preview
      lifecycle: random_once
      materializer: ci
      persist_to: zane_env
      persisted_env_var: MEDUSA_MINIO_ACCESS_KEY
      generator:
        kind: random_alnum
        length: 20
      targets:
        - service_id: medusa-minio
          env_var: DC_MINIO_ACCESS_KEY
        - service_id: medusa-be
          env_var: DC_MINIO_ACCESS_KEY

    - secret_id: preview_minio_secret_key
      scope: preview
      lifecycle: random_once
      materializer: ci
      persist_to: zane_env
      persisted_env_var: MEDUSA_MINIO_SECRET_KEY
      generator:
        kind: random_base64url
        bytes: 32
      targets:
        - service_id: medusa-minio
          env_var: DC_MINIO_SECRET_KEY
        - service_id: medusa-be
          env_var: DC_MINIO_SECRET_KEY

    - secret_id: preview_meilisearch_master_key
      scope: preview
      lifecycle: random_once
      materializer: ci
      persist_to: zane_env
      persisted_env_var: MEDUSA_MEILISEARCH_MASTER_KEY
      generator:
        kind: random_base64url
        bytes: 32
      targets:
        - service_id: medusa-meilisearch
          env_var: MEILI_MASTER_KEY

runtime_providers:
  providers:
    - provider_id: meili_api_credentials
      status: active
      materializer: zane_operator
      source_service_id: medusa-meilisearch
      readiness:
        kind: http_health
        path: /health
      outputs:
        - output_id: backend_key
          output_kind: secret
          target_envs:
            - service_id: medusa-be
              env_var: DC_MEILISEARCH_BACKEND_API_KEY
          policy:
            kind: meilisearch_key
            uid: 14f4c9c4-1a80-4e2f-8e79-19511d2c5ba5
            description: Backend API key for server-side search operations
            actions:
              - search
              - documents.get
              - documents.add
              - documents.delete
              - indexes.create
              - indexes.get
              - indexes.update
              - indexes.swap
              - tasks.get
              - settings.get
              - settings.update
            indexes:
              - products

        - output_id: frontend_key
          output_kind: secret
          target_envs:
            - service_id: n1
              env_var: DC_N1_NEXT_PUBLIC_MEILISEARCH_API_KEY
          policy:
            kind: meilisearch_key
            uid: 4b7f7f7e-8798-4b3f-8e73-c0f76f8b35d6
            description: Browser search key for frontend consumers
            actions:
              - search
            indexes:
              - products

    - provider_id: medusa_publishable_key
      status: reserved
      materializer: zane_operator
      source_service_id: medusa-be
      notes:
        - Target contract intentionally inactive until medusa-be exposes a stable runtime provisioning API.
        - Do not infer output shape or consumer mapping before the upstream contract exists.
      outputs: []

preview_runtime_reconciliation:
  shared_env:
    - key: MEDUSA_DB_HOST
      consumed_by_service_ids: [medusa-be]
      source:
        kind: service_global_network_alias
        service_id: medusa-db
        environment_scope: source

    - key: MEDUSA_VALKEY_HOST
      consumed_by_service_ids: [medusa-be]
      source:
        kind: service_network_alias
        service_id: medusa-valkey

    - key: MEDUSA_MEILISEARCH_HOST
      consumed_by_service_ids: [medusa-be]
      source:
        kind: service_network_alias
        service_id: medusa-meilisearch

    - key: MEDUSA_APP_DB_NAME
      consumed_by_service_ids: [medusa-be]
      source:
        kind: prepare_preview_db_name

    - key: MEDUSA_APP_DB_USER
      consumed_by_service_ids: [medusa-be]
      source:
        kind: prepare_preview_db_user

    - key: MEDUSA_APP_DB_PASSWORD
      consumed_by_service_ids: [medusa-be]
      source:
        kind: prepare_preview_db_password

  service_env:
    - service_id: medusa-be
      env_var: MEDUSA_BACKEND_URL
      source:
        kind: service_public_origin
        service_id: medusa-be

    - service_id: medusa-be
      env_var: STORE_CORS
      source:
        kind: service_public_origin
        service_id: n1

    - service_id: medusa-be
      env_var: ADMIN_CORS
      source:
        kind: service_public_origin
        service_id: medusa-be

    - service_id: medusa-be
      env_var: AUTH_CORS
      source:
        kind: service_public_origin
        service_id: medusa-be

    - service_id: medusa-be
      env_var: MINIO_ENDPOINT
      source:
        kind: service_internal_origin
        service_id: medusa-minio
        port: 9004
        trailing_slash: true

    - service_id: medusa-be
      env_var: MINIO_FILE_URL
      source:
        kind: service_internal_bucket_url
        service_id: medusa-minio
        port: 9004
        bucket_shared_env_key: MEDUSA_MINIO_BUCKET

    - service_id: n1
      env_var: MEDUSA_BACKEND_URL_INTERNAL
      source:
        kind: service_internal_origin
        service_id: medusa-be
        port: 9000

    - service_id: n1
      env_var: NEXT_PUBLIC_MEDUSA_BACKEND_URL
      source:
        kind: service_public_origin
        service_id: medusa-be

    - service_id: n1
      env_var: NEXT_PUBLIC_MEILISEARCH_URL
      source:
        kind: service_public_origin
        service_id: medusa-meilisearch

    - service_id: n1
      env_var: NEXT_PUBLIC_SITE_URL
      source:
        kind: service_public_origin
        service_id: n1

service_reconciliation:
  services:
    - service_id: medusa-be
      builder:
        build_stage_target_by_lane:
          preview: ci-dev
          main: prod

    - service_id: n1
      builder:
        build_stage_target_by_lane:
          preview: ci-dev
          main: prod
