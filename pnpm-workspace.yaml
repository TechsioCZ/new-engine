minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@techsio/storybook-better-a11y'
  - '@techsio/storybook-a11y-reporter'
  - '@medusajs/*'
  - '@paykit-sdk/*'
  - '@rokmohar/medusa-plugin-meilisearch'
# trustPolicy: no-downgrade

# Packages own their test-tool dependencies; catalogs centralize the two
# intentionally supported Vite/Vitest compatibility lines.
catalogs:
  vite5-testing:
    vite: 5.4.21
    vitest: ^3.2.7
  vite8-testing:
    vite: 8.1.3
    vitest: ^4.1.5

strictPeerDependencies: true
disallowWorkspaceCycles: true
dedupeDirectDeps: true
injectWorkspacePackages: true
verifyDepsBeforeRun: false
# Keep registry request fan-out stable across developer and CI machines.
# pnpm otherwise derives this from the available CPU count.
networkConcurrency: 16
storeDir: .pnpm-store
publicHoistPattern:
  - eslint
  - eslint-*
  - '@eslint/*'
  - '@typescript-eslint/*'
  - typescript
  - tailwindcss
  - tailwind-*
  - '@tailwindcss/*'
  - postcss
  - postcss-*
  - '@iconify/tailwind4'
  - storybook
  - storybook-*
  - '@storybook/*'
  - '@rsbuild/*'
  - '@medusajs/*'

overrides:
  csstype: 3.1.3
  react: 19.2.3
  react-dom: 19.2.3
  '@types/react': 19.2.3
  '@types/react-dom': 19.2.3
  '@types/node': 24.12.4

# These exact, package-scoped exceptions acknowledge compatibility without
# rewriting the dependencies' published peer metadata. Future version changes
# will surface as peer errors again and require explicit re-verification.
peerDependencyRules:
  allowedVersions:
    '@medusajs/caching@2.17.2>awilix': 12.0.5
    '@rokmohar/medusa-plugin-meilisearch@1.4.3>awilix': 12.0.5
    'medusa-plugin-content@0.2.0>@medusajs/framework': 2.17.2
    'medusa-plugin-content@0.2.0>@medusajs/js-sdk': 2.17.2
    'medusa-plugin-content@0.2.0>@medusajs/medusa': 2.17.2
    'fdir@6.1.1>picomatch': 4.0.5

supportedArchitectures:
  # `current` still covers Windows when it is the active host. Darwin + Linux
  # and x64 + arm64 are retained for the shared host/Docker store. Runtime
  # images use both Debian/glibc and Alpine/musl.
  os:
    - current
    - darwin
    - linux
  cpu:
    - current
    - x64
    - arm64
  libc:
    - glibc
    - musl

# Manual dependency metadata extensions for packages with incomplete published metadata.
packageExtensions:
  '@medusajs/caching@2.17.2':
    dependencies:
      graphql: 16.14.0
  '@medusajs/core-flows@2.17.2':
    dependencies:
      '@medusajs/utils': 2.17.2
      '@medusajs/workflows-sdk': 2.17.2
  '@rokmohar/medusa-plugin-meilisearch@1.4.3':
    dependencies:
      '@medusajs/js-sdk': ^2.17.2

patchedDependencies:
  medusa-plugin-content@0.2.0: patches/medusa-plugin-content@0.2.0.patch
  '@lexical/code@0.35.0': patches/@lexical__code@0.35.0.patch
  object-inspect@1.13.4: patches/object-inspect@1.13.4.patch

packages:
  - packages/**
  - apps/**
  - libs/**
  - '!apps/demo/**'
  - '!apps/e2e/**'
  - '!apps/typesense-demo/**'
  # agent plugin is published separately, not a workspace package
  - '!libs/ui/agent-plugin/**'

syncInjectedDepsAfterScripts:
  - build

allowBuilds:
  '@nubjs/nub': true
  '@biomejs/biome': true
  '@medusajs/telemetry': false
  '@parcel/watcher': true
  '@swc/core': true
  '@tailwindcss/oxide': true
  core-js: false
  es5-ext: false
  esbuild: true
  msgpackr-extract: false
  msw: false
  nx: true
  protobufjs: false
  puppeteer: false
  sharp: true
  unrs-resolver: true
