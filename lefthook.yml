# Git hooks for new-engine. The root `prepare` script installs them after `pnpm install` in a Git
# checkout. See scripts/check-skill-sync.mjs for the ui-kit version gate.
pre-commit:
  parallel: true
  jobs:
    - name: ui-kit-skill-sync
      # Only worth running when ui-kit sources, skills, or the changelog are touched.
      glob: "libs/ui/**/*"
      run: node scripts/check-skill-sync.mjs
