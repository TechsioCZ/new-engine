# Prod overrides - use with: docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up --build
services:
  medusa-be:
    build:
      target: prod
      args:
        FEATURE_PPL_ENABLED: ${DC_FEATURE_PPL_ENABLED:-0}
        FEATURE_PAYLOAD_ENABLED: ${DC_FEATURE_PAYLOAD_ENABLED:-0}
        FEATURE_PACKETA_ENABLED: ${DC_FEATURE_PACKETA_ENABLED:-0}
    environment:
      NODE_ENV: production
    volumes: !reset []  # Remove inherited dev bind mounts in prod
  n1:
    build:
      target: prod
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${DC_N1_NEXT_PUBLIC_MEDUSA_BACKEND_URL:-http://localhost:9000}
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${DC_N1_NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_SITE_URL: ${DC_N1_NEXT_PUBLIC_SITE_URL:-http://localhost:8000}
        NEXT_PUBLIC_MEILISEARCH_URL: ${DC_N1_NEXT_PUBLIC_MEILISEARCH_URL:-}
        NEXT_PUBLIC_MEILISEARCH_API_KEY: ${DC_N1_NEXT_PUBLIC_MEILISEARCH_API_KEY:-}
        NEXT_PUBLIC_META_PIXEL_ID: ${DC_N1_NEXT_PUBLIC_META_PIXEL_ID:-}
        NEXT_PUBLIC_GOOGLE_ADS_ID: ${DC_N1_NEXT_PUBLIC_GOOGLE_ADS_ID:-}
        NEXT_PUBLIC_LEADHUB_TRACKING_ID: ${DC_N1_NEXT_PUBLIC_LEADHUB_TRACKING_ID:-}
        NEXT_PUBLIC_HEUREKA_API_KEY: ${DC_N1_NEXT_PUBLIC_HEUREKA_API_KEY:-}
    environment:
      NODE_ENV: production
    volumes: !reset []  # Remove inherited dev bind mounts in prod
  payload:
    build:
      target: prod
      args:
        DATABASE_URL: ${DC_PAYLOAD_DATABASE_URL:-postgresql://payload:payload@localhost:5432/payload}
        PAYLOAD_SECRET: ${DC_PAYLOAD_SECRET:-payload_build_secret}
        PAYLOAD_LOCALES: ${DC_PAYLOAD_LOCALES:-en}
        FEATURE_PAYLOAD_ARTICLES_ENABLED: ${DC_FEATURE_PAYLOAD_ARTICLES_ENABLED:-1}
        FEATURE_PAYLOAD_PAGES_ENABLED: ${DC_FEATURE_PAYLOAD_PAGES_ENABLED:-1}
        FEATURE_PAYLOAD_HERO_CAROUSELS_ENABLED: ${DC_FEATURE_PAYLOAD_HERO_CAROUSELS_ENABLED:-1}
        S3_ENDPOINT: ${DC_PAYLOAD_S3_ENDPOINT:-http://localhost:9004}
        S3_REGION: ${DC_PAYLOAD_S3_REGION:-us-east-1}
        S3_BUCKET: ${DC_PAYLOAD_S3_BUCKET:-payload}
        S3_ACCESS_KEY_ID: ${DC_PAYLOAD_S3_ACCESS_KEY_ID:-payload}
        S3_SECRET_ACCESS_KEY: ${DC_PAYLOAD_S3_SECRET_ACCESS_KEY:-payload}
    environment:
      NODE_ENV: production
    volumes: !reset []  # Remove inherited dev bind mounts in prod
