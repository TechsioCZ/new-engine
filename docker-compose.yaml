x-medusa-app-db-env: &medusa-app-db-env
  MEDUSA_APP_DB_USER: ${DC_MEDUSA_APP_DB_USER:-medusa_app}
  MEDUSA_APP_DB_PASSWORD: ${DC_MEDUSA_APP_DB_PASSWORD:-medusa_app_change_me}
  MEDUSA_APP_DB_NAME: ${DC_MEDUSA_APP_DB_NAME:-medusa}
  MEDUSA_APP_DB_SCHEMA: ${DC_MEDUSA_APP_DB_SCHEMA:-medusa}

x-medusa-bootstrap-db-env: &medusa-bootstrap-db-env
  <<: *medusa-app-db-env
  MEDUSA_DEV_DB_USER: ${DC_MEDUSA_DEV_DB_USER:-medusa_dev}
  MEDUSA_DEV_DB_PASSWORD: ${DC_MEDUSA_DEV_DB_PASSWORD:-medusa_dev_change_me}
  MEDUSA_DB_ZANE_OPERATOR_USER: ${DC_ZANE_OPERATOR_PGUSER:-zane_operator}
  MEDUSA_DB_ZANE_OPERATOR_PASSWORD: ${DC_ZANE_OPERATOR_PGPASSWORD:-}
  MEDUSA_DB_ZANE_OPERATOR_DB_TEMPLATE_NAME: ${DC_ZANE_OPERATOR_DB_TEMPLATE_NAME:-template_medusa}

x-medusa-env: &medusa-env
  # Medusa BE: core runtime
  NODE_ENV: ${DC_NODE_ENV:-development}
  JWT_SECRET: ${DC_JWT_SECRET:-supersecret}
  COOKIE_SECRET: ${DC_COOKIE_SECRET:-supersecret}
  MEDUSA_BACKEND_URL: ${DC_MEDUSA_BACKEND_URL:-}
  STORE_CORS: ${DC_STORE_CORS}
  ADMIN_CORS: ${DC_ADMIN_CORS}
  AUTH_CORS: ${DC_AUTH_CORS}
  SUPERADMIN_EMAIL: ${DC_SUPERADMIN_EMAIL:-}
  SUPERADMIN_PASSWORD: ${DC_SUPERADMIN_PASSWORD:-}
  INITIAL_PUBLISHABLE_KEY_NAME: ${DC_INITIAL_PUBLISHABLE_KEY_NAME:-Storefront Publishable Key}

  # Medusa BE: database and schema
  DATABASE_TYPE: postgres
  <<: *medusa-app-db-env
  # Force all Medusa module DB clients (MikroORM/Knex) to use the app schema.
  MEDUSA_DATABASE_SCHEMA: ${DC_MEDUSA_APP_DB_SCHEMA:-medusa}
  DATABASE_SCHEMA: ${DC_MEDUSA_APP_DB_SCHEMA:-medusa}
  # URL-decoded options value is: options=-csearch_path=<schema>,pg_catalog
  # Keep URL encoding when editing manually: %3D is "=", %2C is ","
  DATABASE_URL: postgresql://${DC_MEDUSA_APP_DB_USER:-medusa_app}:${DC_MEDUSA_APP_DB_PASSWORD:-medusa_app_change_me}@${DC_MEDUSA_APP_DB_HOST:-medusa-db}:${DC_MEDUSA_APP_DB_PORT:-5432}/${DC_MEDUSA_APP_DB_NAME:-medusa}?sslmode=${DC_POSTGRES_SSLMODE:-disable}&options=-csearch_path%3D${DC_MEDUSA_APP_DB_SCHEMA:-medusa}%2Cpg_catalog
  LEGACY_DATABASE_URL: ${DC_LEGACY_DATABASE_URL}

  # Medusa BE: dependencies/integrations
  REDIS_URL: ${DC_REDIS_URL:-redis://:${DC_VALKEY_PASSWORD:-valkey_dev_change_me}@medusa-valkey:6379}
  MEILISEARCH_HOST: ${DC_MEILISEARCH_HOST}
  MEILISEARCH_API_KEY: ${DC_MEILISEARCH_BACKEND_API_KEY:-${DC_MEILISEARCH_MASTER_KEY}}
  MINIO_FILE_URL: ${DC_MINIO_FILE_URL}
  MINIO_REGION: ${DC_MINIO_REGION}
  MINIO_ENDPOINT: ${DC_MINIO_ENDPOINT}
  MINIO_BUCKET: ${DC_MINIO_BUCKET}
  MINIO_ACCESS_KEY: ${DC_MINIO_ACCESS_KEY}
  MINIO_SECRET_KEY: ${DC_MINIO_SECRET_KEY}

  # Medusa BE: observability/features
  SENTRY_NAME: ${DC_SENTRY_NAME}
  SENTRY_DSN: ${DC_SENTRY_DSN}
  SETTINGS_ENCRYPTION_KEY: ${DC_SETTINGS_ENCRYPTION_KEY}
  FEATURE_PPL_ENABLED: ${DC_FEATURE_PPL_ENABLED:-0}
  PPL_ENVIRONMENT: ${DC_PPL_ENVIRONMENT:-testing}

x-minio-env: &minio-env
  MINIO_ROOT_USER: ${DC_MINIO_ROOT_USER:-minioadmin}
  MINIO_ROOT_PASSWORD: ${DC_MINIO_ROOT_PASSWORD:-minioadmin}
  MINIO_MEDUSA_ACCESS_KEY: ${DC_MINIO_ACCESS_KEY:-medusaappkey}
  MINIO_MEDUSA_SECRET_KEY: ${DC_MINIO_SECRET_KEY:-medusaappsecret_change_me}
  MINIO_MEDUSA_BUCKET: ${DC_MINIO_BUCKET}

x-meilisearch-env: &meilisearch-env
  MEILI_MASTER_KEY: ${DC_MEILISEARCH_MASTER_KEY}
  MEILI_NO_ANALYTICS: true

x-zane-operator-db-env: &zane-operator-db-env
  # zane-operator: postgres connectivity
  PGHOST: medusa-db
  PGPORT: 5432
  PGUSER: ${DC_ZANE_OPERATOR_PGUSER:-zane_operator}
  # Keep optional at interpolation time; runtime entrypoint enforces required values when operator profile is used.
  PGPASSWORD: ${DC_ZANE_OPERATOR_PGPASSWORD:-}
  PGDATABASE: ${DC_ZANE_OPERATOR_PGDATABASE:-postgres}
  PGSSLMODE: ${DC_POSTGRES_SSLMODE:-disable}
  DB_TEMPLATE_NAME: ${DC_ZANE_OPERATOR_DB_TEMPLATE_NAME:-template_medusa}
  DB_PREVIEW_PREFIX: ${DC_ZANE_OPERATOR_DB_PREVIEW_PREFIX:-medusa_pr_}
  DB_PREVIEW_APP_USER_PREFIX: ${DC_ZANE_OPERATOR_DB_PREVIEW_APP_USER_PREFIX:-medusa_pr_app_}
  DB_PREVIEW_DEV_ROLE: ${DC_MEDUSA_DEV_DB_USER:-medusa_dev}
  DB_APP_SCHEMA: ${DC_MEDUSA_APP_DB_SCHEMA:-medusa}
  DB_PREVIEW_APP_PASSWORD_SECRET: ${DC_ZANE_OPERATOR_DB_PREVIEW_APP_PASSWORD_SECRET:-}
  DB_PROTECTED_NAMES: ${DC_ZANE_OPERATOR_DB_PROTECTED_NAMES:-postgres,template0,template1}

x-zane-operator-env: &zane-operator-env
  # zane-operator: service runtime
  PORT: ${DC_ZANE_OPERATOR_PORT:-8080}
  NODE_ENV: ${DC_NODE_ENV:-development}
  API_AUTH_TOKEN: ${DC_ZANE_OPERATOR_API_AUTH_TOKEN:-}
  ZANE_BASE_URL: ${DC_ZANE_OPERATOR_ZANE_BASE_URL:-}
  ZANE_CONNECT_BASE_URL: ${DC_ZANE_OPERATOR_ZANE_CONNECT_BASE_URL:-}
  ZANE_CONNECT_HOST_HEADER: ${DC_ZANE_OPERATOR_ZANE_CONNECT_HOST_HEADER:-}
  ZANE_USERNAME: ${DC_ZANE_OPERATOR_ZANE_USERNAME:-}
  ZANE_PASSWORD: ${DC_ZANE_OPERATOR_ZANE_PASSWORD:-}
  <<: *zane-operator-db-env

x-medusa-base: &medusa-base
  restart: unless-stopped
  container_name: wr_medusa_be
  ports:
    - "127.0.0.1:9000:9000"
    - "127.0.0.1:9009:9009"
    - "127.0.0.1:24678:24678"
  depends_on:
    medusa-db:
      condition: service_healthy
    medusa-valkey:
      condition: service_healthy
    medusa-minio:
      condition: service_healthy
    medusa-meilisearch:
      condition: service_healthy
  networks:
    - internal
  environment:
    <<: *medusa-env

x-n1-env: &n1-env
  # N1: backend connectivity
  MEDUSA_BACKEND_URL_INTERNAL: ${DC_N1_MEDUSA_BACKEND_URL_INTERNAL:-http://medusa-be:9000}
  NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${DC_N1_NEXT_PUBLIC_MEDUSA_BACKEND_URL:-http://localhost:9000}
  NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${DC_N1_NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:-}

  # N1: search/discovery
  NEXT_PUBLIC_MEILISEARCH_URL: ${DC_N1_NEXT_PUBLIC_MEILISEARCH_URL:-http://localhost:7700}
  NEXT_PUBLIC_MEILISEARCH_API_KEY: ${DC_N1_NEXT_PUBLIC_MEILISEARCH_API_KEY:-}

  # N1: site and tracking
  NEXT_PUBLIC_SITE_URL: ${DC_N1_NEXT_PUBLIC_SITE_URL:-http://localhost:8000}
  NEXT_PUBLIC_META_PIXEL_ID: ${DC_N1_NEXT_PUBLIC_META_PIXEL_ID:-}
  NEXT_PUBLIC_GOOGLE_ADS_ID: ${DC_N1_NEXT_PUBLIC_GOOGLE_ADS_ID:-}
  NEXT_PUBLIC_HEUREKA_API_KEY: ${DC_N1_NEXT_PUBLIC_HEUREKA_API_KEY:-}
  NEXT_PUBLIC_LEADHUB_TRACKING_ID: ${DC_N1_NEXT_PUBLIC_LEADHUB_TRACKING_ID:-}

  # N1: email/contact
  RESEND_API_KEY: ${DC_N1_MEDUSA_RESEND_API_KEY:-}
  CONTACT_EMAIL: ${DC_N1_MEDUSA_CONTACT_EMAIL:-}
  RESEND_FROM_EMAIL: ${DC_N1_MEDUSA_RESEND_FROM_EMAIL:-}

services:
  # DEV MODE (default): docker compose up
  # PROD MODE: docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up --build
  medusa-be:
    <<: *medusa-base
    build:
      context: .
      dockerfile: docker/development/medusa-be/Dockerfile
      target: dev
    volumes:
      - .:/var/www
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/app"]
      start_period: 20s
      interval: 10s
  n1:
    restart: unless-stopped
    container_name: wr_n1
    build:
      context: .
      dockerfile: docker/development/n1/Dockerfile
      target: dev
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${DC_N1_NEXT_PUBLIC_MEDUSA_BACKEND_URL:-http://localhost:9000}
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${DC_N1_NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:-}
    depends_on:
      medusa-be:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:3000"
    networks:
      - internal
    environment:
      <<: *n1-env
      NODE_ENV: development
    volumes:
      - .:/var/www
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      start_period: 30s
      interval: 30s
      retries: 5
  medusa-valkey:
    build:
      context: ./docker/development/medusa-valkey
      dockerfile: Dockerfile
    command: ["sh", "-lc", "exec valkey-server --requirepass \"$$VALKEY_PASSWORD\" --appendonly yes"]
    container_name: wr_medusa_valkey
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a \"$${VALKEY_PASSWORD}\" --no-auth-warning ping | grep -q PONG"]
      start_period: 5s
      timeout: 3s
      interval: 1s
      retries: 5
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - medusa-valkey-data:/data
    networks:
      - internal
    environment:
      VALKEY_PASSWORD: ${DC_VALKEY_PASSWORD:-valkey_dev_change_me}
  medusa-minio:
    build:
      context: ./docker/development/medusa-minio
      dockerfile: Dockerfile
    container_name: wr_medusa_minio
    ports:
      - "127.0.0.1:9003:9003"
      - "127.0.0.1:9004:9004"
    volumes:
      - medusa-minio-data:/data
    networks:
      - internal
    command: server /data --console-address ":9003" --address :9004
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/minio/health/live"]
    environment:
      <<: *minio-env
  medusa-meilisearch:
    build:
      context: ./docker/development/medusa-meilisearch
      dockerfile: Dockerfile
    container_name: wr_medusa_meilisearch
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - medusa-meilisearch-data:/meili_data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      <<: [*medusa-env, *meilisearch-env]
  medusa-db:
    build:
      context: ./docker/development/postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["/usr/local/bin/run-postgres-with-bootstrap.sh"]
    ports:
      - "127.0.0.1:${DC_POSTGRES_PUBLIC_PORT:-5432}:5432"
    volumes:
      - ${DC_POSTGRES_VOLUME_DATA:-./.docker_data/db18}:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "/usr/local/bin/postgres-ready-with-bootstrap.sh"]
      start_period: 10s
      interval: 30s
      timeout: 60s
      retries: 3
    environment:
      <<: *medusa-bootstrap-db-env
      POSTGRES_PASSWORD: ${DC_POSTGRES_SUPERUSER_PASSWORD:-root}
      POSTGRES_USER: ${DC_POSTGRES_SUPERUSER:-root}
      POSTGRES_DB: ${DC_MEDUSA_APP_DB_NAME:-medusa}
      PGDATA: /var/lib/postgresql/18/docker
  zane-operator:
    profiles: ["operator"]
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/development/zane-operator/Dockerfile
    entrypoint:
      - /bin/sh
      - -ec
      - |
        [ -n "$$API_AUTH_TOKEN" ] || { echo "Missing required env: API_AUTH_TOKEN. Set DC_ZANE_OPERATOR_API_AUTH_TOKEN." >&2; exit 1; }
        [ -n "$$PGUSER" ] || { echo "Missing required env: PGUSER. Set DC_ZANE_OPERATOR_PGUSER." >&2; exit 1; }
        [ -n "$$PGPASSWORD" ] || { echo "Missing required env: PGPASSWORD. Set DC_ZANE_OPERATOR_PGPASSWORD." >&2; exit 1; }
        [ -n "$$DB_PREVIEW_APP_PASSWORD_SECRET" ] || { echo "Missing required env: DB_PREVIEW_APP_PASSWORD_SECRET. Set DC_ZANE_OPERATOR_DB_PREVIEW_APP_PASSWORD_SECRET." >&2; exit 1; }
        exec /app/zane-operator
    depends_on:
      medusa-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${DC_ZANE_OPERATOR_PUBLIC_PORT:-8082}:${DC_ZANE_OPERATOR_PORT:-8080}"
    networks:
      - internal
    environment:
      <<: *zane-operator-env
  engine-db:
    image: mariadb:latest
    restart: no
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: wrshop
      MYSQL_USER: wruser
      MYSQL_PASSWORD: 1234
    command: --sql_mode="NO_ENGINE_SUBSTITUTION"
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./.docker_data/dbmysql:/var/lib/mysql
      - ./docker/development/mariadb/wr.cnf:/etc/mysql/conf.d/wr.cnf
    networks:
      - internal
  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      - medusa-db
    networks:
      - internal
    environment:
      ADMINER_DESIGN: nette
      ADMINER_DEFAULT_SERVER: medusa-db
      ADMINER_PLUGINS: "dump-json"
  caddy:
    build:
      context: ./docker/development/caddy
      dockerfile: Dockerfile
    cap_add:
      - NET_ADMIN
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
      - "127.0.0.1:443:443/udp"
    networks:
      - internal
    volumes:
      - ./docker/development/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - host.docker.internal:host-gateway
networks:
  internal:
    driver: bridge

volumes:
  medusa-valkey-data:
  medusa-minio-data:
  medusa-meilisearch-data:
  caddy_data:
  caddy_config:
