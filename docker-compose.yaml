services:
  # DEV MODE (default): docker compose up
  # PROD MODE: docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up --build
  medusa-be:
    <<: *medusa-base
    build:
      context: .
      dockerfile: docker/development/medusa-be/Dockerfile
      target: dev
      args:
        FEATURE_PPL_ENABLED: ${DC_FEATURE_PPL_ENABLED:-0}
        FEATURE_PACKETA_ENABLED: ${DC_FEATURE_PACKETA_ENABLED:-0}
        FEATURE_PAYLOAD_ENABLED: ${DC_FEATURE_PAYLOAD_ENABLED:-0}
    volumes:
      - .:/var/www
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/health" ]
      start_period: 60s
      interval: 15s
      timeout: 10s
      retries: 8
  payload:
    restart: unless-stopped
    container_name: wr_payload
    build:
      context: .
      dockerfile: docker/development/payload/Dockerfile
      target: dev
    working_dir: /var/www
    command: ["payload-runtime", "devsafe"]
    depends_on:
      medusa-db:
        condition: service_healthy
      medusa-minio:
        condition: service_healthy
    ports:
      - "127.0.0.1:8083:8083"
    networks:
      - internal
    environment:
      <<: *payload-env
      NODE_ENV: development
    volumes:
      - .:/var/www
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8083/api/health" ]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 5
  n1:
    restart: unless-stopped
    container_name: wr_n1
    build:
      context: .
      dockerfile: docker/development/n1/Dockerfile
      target: dev
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${DC_N1_NEXT_PUBLIC_MEDUSA_BACKEND_URL:-http://localhost:9000}
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${DC_N1_NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:-}
    depends_on:
      medusa-be:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:3000"
    networks:
      - internal
    environment:
      <<: *n1-env
      NODE_ENV: development
    volumes:
      - .:/var/www
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      start_period: 30s
      interval: 30s
      retries: 5
  herbatika:
    restart: unless-stopped
    container_name: wr_herbatika
    build:
      context: .
      dockerfile: docker/development/herbatika/Dockerfile
      target: dev
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${DC_HERBATIKA_NEXT_PUBLIC_MEDUSA_BACKEND_URL:-http://localhost:9000}
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${DC_HERBATIKA_NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_STOREFRONT_AUTH_MODE: ${DC_HERBATIKA_NEXT_PUBLIC_STOREFRONT_AUTH_MODE:-session_proxy}
        NEXT_PUBLIC_PACKETA_WIDGET_API_KEY: ${DC_HERBATIKA_NEXT_PUBLIC_PACKETA_WIDGET_API_KEY:-}
        NEXT_PUBLIC_PACKETA_WIDGET_COUNTRIES: ${DC_HERBATIKA_NEXT_PUBLIC_PACKETA_WIDGET_COUNTRIES:-sk}
        NEXT_PUBLIC_PAYLOAD_BASE_URL: ${DC_HERBATIKA_NEXT_PUBLIC_PAYLOAD_BASE_URL:-http://localhost:8083}
    depends_on:
      medusa-be:
        condition: service_healthy
    ports:
      - "127.0.0.1:${DC_HERBATIKA_PUBLIC_PORT:-3001}:3000"
    networks:
      - internal
    environment:
      <<: *herbatika-env
      NODE_ENV: development
    volumes:
      - .:/var/www
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 5
  medusa-valkey:
    build:
      context: ./docker/development/medusa-valkey
      dockerfile: Dockerfile
    command: [ "sh", "-lc", "exec valkey-server --requirepass \"$$VALKEY_PASSWORD\" --appendonly yes" ]
    container_name: wr_medusa_valkey
    healthcheck:
      test: [ "CMD-SHELL", "valkey-cli -a \"$${VALKEY_PASSWORD}\" --no-auth-warning ping | grep -q PONG" ]
      start_period: 5s
      timeout: 3s
      interval: 1s
      retries: 5
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - medusa-valkey-data:/data
    networks:
      - internal
    environment:
      VALKEY_PASSWORD: ${DC_VALKEY_PASSWORD:-valkey_dev_change_me}
  medusa-minio:
    build:
      context: ./docker/development/medusa-minio
      dockerfile: Dockerfile
    container_name: wr_medusa_minio
    ports:
      - "127.0.0.1:9003:9003"
      - "127.0.0.1:9004:9004"
    volumes:
      - medusa-minio-data:/data
    networks:
      - internal
    command: server /data --console-address ":9003" --address :9004
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9004/minio/health/live" ]
    environment:
      <<: *minio-env
  medusa-meilisearch:
    build:
      context: ./docker/development/medusa-meilisearch
      dockerfile: Dockerfile
    container_name: wr_medusa_meilisearch
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - medusa-meilisearch-data:/meili_data
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7700/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      <<: *meilisearch-env
  medusa-db:
    build:
      context: ./docker/development/postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    command: [ "/usr/local/bin/run-postgres-with-bootstrap.sh" ]
    ports:
      - "127.0.0.1:${DC_POSTGRES_PUBLIC_PORT:-5432}:5432"
    volumes:
      - ${DC_POSTGRES_VOLUME_DATA:-./.docker_data/db18}:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "/usr/local/bin/postgres-ready-with-bootstrap.sh" ]
      start_period: 10s
      interval: 30s
      timeout: 60s
      retries: 3
    environment:
      <<: *medusa-bootstrap-db-env
      POSTGRES_PASSWORD: ${DC_POSTGRES_SUPERUSER_PASSWORD:-root}
      POSTGRES_USER: ${DC_POSTGRES_SUPERUSER:-root}
      POSTGRES_DB: ${DC_MEDUSA_APP_DB_NAME:-medusa}
      PGDATA: /var/lib/postgresql/18/docker
  zane-operator:
    profiles: [ "operator" ]
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/development/zane-operator/Dockerfile
      target: dev
    entrypoint:
      - /bin/sh
      - -ec
      - |
        [ -n "$$API_AUTH_TOKEN" ] || { echo "Missing required env: API_AUTH_TOKEN. Set DC_ZANE_OPERATOR_API_AUTH_TOKEN." >&2; exit 1; }
        [ -n "$$PGUSER" ] || { echo "Missing required env: PGUSER. Set DC_ZANE_OPERATOR_PGUSER." >&2; exit 1; }
        [ -n "$$PGPASSWORD" ] || { echo "Missing required env: PGPASSWORD. Set DC_ZANE_OPERATOR_PGPASSWORD." >&2; exit 1; }
        [ -n "$$DB_PREVIEW_APP_PASSWORD_SECRET" ] || { echo "Missing required env: DB_PREVIEW_APP_PASSWORD_SECRET. Set DC_ZANE_OPERATOR_DB_PREVIEW_APP_PASSWORD_SECRET." >&2; exit 1; }
        exec sh -lc "$${ZANE_OPERATOR_RUNTIME_COMMAND:-pnpm --dir apps/zane-operator dev}"
    depends_on:
      medusa-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${DC_ZANE_OPERATOR_PUBLIC_PORT:-8082}:${DC_ZANE_OPERATOR_PORT:-8080}"
    networks:
      - internal
    environment:
      <<: *zane-operator-env
    volumes:
      - .:/var/www
  engine-db:
    image: mariadb:latest
    restart: no
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: wrshop
      MYSQL_USER: wruser
      MYSQL_PASSWORD: 1234
    command: --sql_mode="NO_ENGINE_SUBSTITUTION"
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./.docker_data/dbmysql:/var/lib/mysql
      - ./docker/development/mariadb/wr.cnf:/etc/mysql/conf.d/wr.cnf
    networks:
      - internal
  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      - medusa-db
    networks:
      - internal
    environment:
      ADMINER_DESIGN: nette
      ADMINER_DEFAULT_SERVER: medusa-db
      ADMINER_PLUGINS: "dump-json"
  caddy:
    build:
      context: ./docker/development/caddy
      dockerfile: Dockerfile
    cap_add:
      - NET_ADMIN
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
      - "127.0.0.1:443:443/udp"
    networks:
      - internal
    volumes:
      - ./docker/development/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - host.docker.internal:host-gateway
networks:
  internal:
    driver: bridge

volumes:
  medusa-valkey-data:
  medusa-minio-data:
  medusa-meilisearch-data:
  caddy_data:
  caddy_config:
