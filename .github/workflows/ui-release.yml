name: UI Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      force_release:
        description: Run the UI release even when Nx does not mark ui-kit as affected.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  check-affected:
    runs-on: ubuntu-latest
    outputs:
      is_affected: ${{ steps.check.outputs.is_affected }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Nx SHAs
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: master

      - name: Check if UI is affected
        id: check
        env:
          FORCE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_release }}
        run: |
          if [ "$FORCE_RELEASE" = "true" ]; then
            echo "is_affected=true" >> "$GITHUB_OUTPUT"
            echo "UI release was manually forced"
            exit 0
          fi

          AFFECTED=$(pnpm exec nx show projects --affected --base="$NX_BASE" --head="$NX_HEAD")
          echo "$AFFECTED"
          if echo "$AFFECTED" | grep -q "^ui-kit$"; then
            echo "is_affected=true" >> "$GITHUB_OUTPUT"
            echo "UI library is affected, will proceed with release"
          else
            echo "is_affected=false" >> "$GITHUB_OUTPUT"
            echo "UI library is not affected, skipping release"
          fi

  release:
    needs: check-affected
    if: needs.check-affected.outputs.is_affected == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
          scope: '@techsio'

      - name: Update npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build UI package
        run: pnpm -C libs/ui build

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm -C libs/ui semantic-release
