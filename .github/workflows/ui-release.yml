name: UI Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      force_release:
        description: Run the UI release even when Nx does not mark ui-kit as affected.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ui-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-affected:
    runs-on: ubuntu-latest
    outputs:
      is_affected: ${{ steps.check.outputs.is_affected }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Nx SHAs
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
        with:
          main-branch-name: master

      - name: Check if UI is affected
        id: check
        env:
          FORCE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_release }}
        run: |
          if [ "$FORCE_RELEASE" = "true" ]; then
            echo "is_affected=true" >> "$GITHUB_OUTPUT"
            echo "UI release was manually forced"
            exit 0
          fi

          AFFECTED=$(./node_modules/.bin/nubx --node nx show projects --affected --base="$NX_BASE" --head="$NX_HEAD")
          echo "$AFFECTED"
          if echo "$AFFECTED" | grep -q "^ui-kit$"; then
            echo "is_affected=true" >> "$GITHUB_OUTPUT"
            echo "UI library is affected, will proceed with release"
          else
            echo "is_affected=false" >> "$GITHUB_OUTPUT"
            echo "UI library is not affected, skipping release"
          fi

  release:
    needs: check-affected
    if: needs.check-affected.outputs.is_affected == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: '@techsio'

      - name: Update npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build UI package
        run: pnpm -C libs/ui build

      - name: Fetch semantic-release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/notes/*:refs/notes/*" || true

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm -C libs/ui semantic-release
