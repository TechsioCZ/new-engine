name: Smart Suggest UltraModern Workspace Gates

on:
  push:
    paths:
      - "apps/smart-suggest/**"
      - "libs/smart-suggest/**"
      - ".github/workflows/smart-suggest-ultramodern-workspace-gates.yml"
  pull_request:
    paths:
      - "apps/smart-suggest/**"
      - "libs/smart-suggest/**"
      - ".github/workflows/smart-suggest-ultramodern-workspace-gates.yml"

permissions:
  contents: read

defaults:
  run:
    shell: bash
    working-directory: apps/smart-suggest

concurrency:
  group: smart-suggest-ultramodern-workspace-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace-gate:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Format
            command: pnpm format:check
          - name: Lint
            command: pnpm lint
          - name: Typecheck
            command: pnpm typecheck
          - name: Skills
            command: pnpm skills:check
          - name: I18n Boundaries
            command: pnpm i18n:boundaries
          - name: API
            command: pnpm api:check
          - name: Contract
            command: pnpm contract:check
          - name: Smoke
            command: pnpm test:smoke
          - name: Build
            command: pnpm build
          - name: MF Types
            command: pnpm mf:types
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "26.3.0"

      - name: Setup mise
        uses: jdx/mise-action@5ac50f778e26fac95da98d50503682459e86d566 # v3.2.0

      - name: Install Dependencies
        run: mise exec -- pnpm install --frozen-lockfile --ignore-scripts

      - name: Run ${{ matrix.name }}
        env:
          MODERN_PUBLIC_SITE_URL: http://localhost:8080
        run: mise exec -- ${{ matrix.command }}
