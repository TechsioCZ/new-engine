name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
  NX_NO_CLOUD: "true"

jobs:
  format-and-lint:
    name: Format and lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies without lifecycle scripts
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts --strict-peer-dependencies
      - name: Check Oxfmt
        run: pnpm format:check
      - name: Run type-aware Oxlint
        run: pnpm lint:oxlint
      - name: Run scoped Medusa ESLint
        run: pnpm lint:medusa

  architecture-and-hygiene:
    name: Architecture and hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies without lifecycle scripts
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts --strict-peer-dependencies
      - name: Verify lockfile is deduplicated
        run: pnpm dedupe --check
      - name: Reject edits to committed migrations
        run: node scripts/danger/check-migration-immutability.mjs "${{ github.event.pull_request.base.sha || github.event.before }}"
      - name: Enforce dependency boundaries
        run: pnpm depcruise
      - name: Enforce structural rules
        run: pnpm ast-grep
      - name: Find unused files, exports, and dependencies
        run: pnpm knip
      - name: Reject duplicated source blocks above one percent
        run: pnpm jscpd

  typecheck:
    name: TypeScript 7 source graph
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies without lifecycle scripts
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts --strict-peer-dependencies
      - name: Audit TypeScript compiler isolation and strict policy
        run: node scripts/typescript/audit.mjs
      - name: Verify root TypeScript compiler
        run: test "$(pnpm exec tsc --version)" = "Version 7.0.2"
      - name: Verify native TypeScript compiler
        run: test "$(pnpm exec tsgo --version)" = "Version 7.0.0-dev.20260707.2"
      - name: Typecheck every source project with tsc
        run: pnpm typecheck:tsc
      - name: Typecheck every source project with native tsgo
        run: pnpm typecheck:tsgo

  design-tokens:
    name: Design tokens
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install UI token validation dependencies without lifecycle scripts
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts --strict-peer-dependencies --filter='.' --filter='@techsio/ui-kit...'
      - name: Validate UI design-token usage and definitions
        run: pnpm --dir libs/ui validate:tokens

  tests:
    name: Affected tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies without lifecycle scripts
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts --strict-peer-dependencies
      - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
        with:
          main-branch-name: master
      - name: Test CI scope wiring
        run: ./node_modules/.bin/nubx --node nx run new-engine-ctl:test
      - name: Run affected tests
        run: ./node_modules/.bin/nubx --node nx affected -t test

  builds:
    name: Affected builds
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies without lifecycle scripts
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts --strict-peer-dependencies
      - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
        with:
          main-branch-name: master
      - name: Run affected builds
        run: ./node_modules/.bin/nubx --node nx affected -t build

  # Experimental tools report signal here but are deliberately excluded from
  # quality-gate until their false-positive rates are proven stable.
  advisory-trials:
    name: Advisory trials
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies without lifecycle scripts
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts --strict-peer-dependencies
      - name: Trial Ultracite policy checks
        id: ultracite
        continue-on-error: true
        run: pnpm exec ultracite check .
      - name: Trial React Doctor on changed React code
        id: react-doctor
        continue-on-error: true
        run: pnpm exec react-doctor . --scope changed --base "${{ github.event.pull_request.base.sha }}" --blocking none --max-duration 180 --no-score --no-supply-chain -y
      - name: Trial konsistent conventions
        id: konsistent
        continue-on-error: true
        run: |
          if [ -f konsistent.json ]; then
            pnpm exec konsistent check --format=github --error-on-warnings
          else
            echo "No konsistent.json yet; trial recorded as not configured." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Detect Dangerfile
        id: dangerfile
        run: |
          if [ -f Dangerfile ] || [ -f Dangerfile.ts ] || [ -f Dangerfile.js ] || [ -f dangerfile.ts ] || [ -f dangerfile.js ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "No Dangerfile yet; trial recorded as not configured." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Trial Danger review automation
        id: danger
        if: steps.dangerfile.outputs.configured == 'true'
        continue-on-error: true
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/danger/run.mjs ci
      - name: Advisory summary
        if: always()
        env:
          ULTRACITE: ${{ steps.ultracite.outcome }}
          REACT_DOCTOR: ${{ steps.react-doctor.outcome }}
          KONSISTENT: ${{ steps.konsistent.outcome }}
          DANGER: ${{ steps.dangerfile.outputs.configured == 'true' && steps.danger.outcome || 'not configured' }}
        run: |
          {
            printf '%s\n' "## Advisory trials"
            printf '%s\n' "- Ultracite: $ULTRACITE"
            printf '%s\n' "- React Doctor: $REACT_DOCTOR"
            printf '%s\n' "- konsistent: $KONSISTENT"
            printf '%s\n' "- Danger: $DANGER"
            printf '%s\n' "These trials do not participate in quality-gate."
          } >> "$GITHUB_STEP_SUMMARY"

  quality-gate:
    name: quality-gate
    if: always()
    needs:
      - format-and-lint
      - architecture-and-hygiene
      - typecheck
      - design-tokens
      - tests
      - builds
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every blocking lane to pass
        env:
          FORMAT_AND_LINT: ${{ needs.format-and-lint.result }}
          ARCHITECTURE_AND_HYGIENE: ${{ needs.architecture-and-hygiene.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          DESIGN_TOKENS: ${{ needs.design-tokens.result }}
          TESTS: ${{ needs.tests.result }}
          BUILDS: ${{ needs.builds.result }}
        run: |
          failed=0
          for result in \
            "$FORMAT_AND_LINT" \
            "$ARCHITECTURE_AND_HYGIENE" \
            "$TYPECHECK" \
            "$DESIGN_TOKENS" \
            "$TESTS" \
            "$BUILDS"; do
            if [ "$result" != "success" ]; then
              failed=1
            fi
          done

          {
            printf '%s\n' "## Blocking quality gate"
            printf '%s\n' "- Format and lint: $FORMAT_AND_LINT"
            printf '%s\n' "- Architecture and hygiene: $ARCHITECTURE_AND_HYGIENE"
            printf '%s\n' "- TypeScript 7 tsc and native tsgo source graph: $TYPECHECK"
            printf '%s\n' "- Design tokens: $DESIGN_TOKENS"
            printf '%s\n' "- Affected tests: $TESTS"
            printf '%s\n' "- Affected builds: $BUILDS"
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$failed"
