name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
      NX_NO_CLOUD: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Uncomment this line to enable task distribution
      # - run: pnpm dlx nx-cloud start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"


      # Cache node_modules
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
      - name: Determine affected projects
        id: determine_affected
        run: |
          base="${NX_BASE:-origin/master}"
          head="${NX_HEAD:-HEAD}"
          projects_json="$(./node_modules/.bin/nubx --node nx show projects --affected --json --base="$base" --head="$head")"
          projects="$(printf '%s' "$projects_json" | node -e 'let input = ""; process.stdin.on("data", chunk => input += chunk); process.stdin.on("end", () => { const projects = input.trim() ? JSON.parse(input) : []; if (!Array.isArray(projects)) { throw new Error("Expected an array from nx show projects --json"); } process.stdout.write(projects.join(",")); });')"
          echo "projects=${projects}" >> "$GITHUB_OUTPUT"
          echo "projects_csv=,${projects}," >> "$GITHUB_OUTPUT"
      - name: Install mise for Smart Suggest
        if: contains(steps.determine_affected.outputs.projects_csv, ',smart-suggest,')
        uses: jdx/mise-action@v4
        with:
          install: false
      - name: Install Smart Suggest toolchain
        if: contains(steps.determine_affected.outputs.projects_csv, ',smart-suggest,')
        working-directory: apps/smart-suggest
        run: |
          mise trust .mise.toml
          mise install
          mise exec -- pnpm install --frozen-lockfile --ignore-scripts
      - name: Generate Next.js types (n1)
        id: generate_next_types_n1
        if: contains(steps.determine_affected.outputs.projects_csv, ',n1,')
        run: TURBOPACK=1 pnpm --filter=n1 exec next typegen

      # Prepend any command with "nx-cloud record --" to record its logs to Nx Cloud
      # - run: pnpm exec nx-cloud record -- echo Hello World
      - name: Lint Nx module boundaries
        run: pnpm lint:nx
      - name: Test new-engine-ctl CI wiring
        run: ./node_modules/.bin/nubx --node nx run new-engine-ctl:test
      - name: Typecheck affected prepared projects
        run: |
          affected="${{ steps.determine_affected.outputs.projects }}"
          # Only run project-owned typecheck targets; inferred TypeScript targets use build mode.
          prepared="@techsio/storefront-data,new-engine-ctl,zane-operator,medusa-symmy-plugin,medusa-order-dashboard-plugin"
          projects="$(AFFECTED="$affected" PREPARED="$prepared" node -e 'const affected = (process.env.AFFECTED || "").split(",").filter(Boolean); const prepared = new Set((process.env.PREPARED || "").split(",").filter(Boolean)); process.stdout.write(affected.filter((project) => prepared.has(project)).join(","));')"
          if [ -z "$projects" ]; then
            echo "No affected projects with explicit typecheck targets."
            exit 0
          fi
          ./node_modules/.bin/nubx --node nx run-many -t typecheck --projects="$projects"
      # Nx Affected runs only tasks affected by the changes in this PR/commit. Learn more: https://nx.dev/ci/features/affected
      - run: ./node_modules/.bin/nubx --node nx affected -t lint test
