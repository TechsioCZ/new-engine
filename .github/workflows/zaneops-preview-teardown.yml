name: ZaneOps Preview Teardown

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  teardown:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: zaneops-preview-teardown-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Validate teardown inputs
        env:
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
          ZANE_CANONICAL_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
        run: bash ./scripts/ci/check-workflow-inputs.sh preview-teardown

      - name: Teardown preview environment
        id: teardown_env
        continue-on-error: true
        env:
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
          ZANE_CANONICAL_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
        run: bash ./scripts/ci/preview-environment.sh delete "${{ github.event.pull_request.number }}"

      - name: Teardown preview DB
        id: teardown_db
        continue-on-error: true
        env:
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
        run: bash ./scripts/ci/preview-db.sh delete "${{ github.event.pull_request.number }}"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Preview Teardown"
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- Environment outcome: ${{ steps.teardown_env.outcome }}"
            echo "- Environment HTTP: ${{ steps.teardown_env.outputs.http_code || 'n/a' }}"
            echo "- Environment name: ${{ steps.teardown_env.outputs.environment_name || 'n/a' }}"
            echo "- Environment noop: ${{ steps.teardown_env.outputs.noop || 'n/a' }}"
            echo "- Outcome: ${{ steps.teardown_db.outcome }}"
            echo "- DB HTTP: ${{ steps.teardown_db.outputs.http_code || 'n/a' }}"
            echo "- DB status: ${{ steps.teardown_db.outputs.status || 'n/a' }}"
            echo "- DB name: ${{ steps.teardown_db.outputs.db_name || 'n/a' }}"
            echo "- DB noop: ${{ steps.teardown_db.outputs.noop || 'n/a' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when teardown failed
        if: steps.teardown_env.outcome != 'success' || steps.teardown_db.outcome != 'success'
        run: |
          echo "Preview teardown failed and requires manual retry." >&2
          exit 1
