name: ZaneOps Main After CI

# Temporarily disabled. Restore the CI workflow_run trigger when re-enabling
# ZaneOps main deployments.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  NX_NO_CLOUD: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  scope:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      base_sha: ${{ steps.base.outputs.base_sha }}
      projects_csv: ${{ steps.scope_data.outputs.projects_csv }}
      services_csv: ${{ steps.scope_data.outputs.services_csv }}
      nx_status: ${{ steps.scope_data.outputs.nx_status }}
      requires_downtime_approval: ${{ steps.scope_data.outputs.requires_downtime_approval }}
      downtime_service_ids: ${{ steps.scope_data.outputs.downtime_service_ids }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build new-engine-ctl
        run: ./node_modules/.bin/nubx --node nx run new-engine-ctl:build

      - name: Resolve base SHA
        id: base
        run: |
          base_sha="$(git rev-parse HEAD^ 2>/dev/null || true)"
          if [[ -z "$base_sha" ]]; then
            base_sha="$(git rev-list --max-parents=0 HEAD)"
          fi
          echo "base_sha=${base_sha}" >> "$GITHUB_OUTPUT"

      - name: Resolve main scope
        id: scope_data
        env:
          BASE_SHA: ${{ steps.base.outputs.base_sha }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          node apps/new-engine-ctl/dist/cli.js scope \
            --lane main \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA"

      - name: Upload new-engine-ctl artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: new-engine-ctl-dist
          path: apps/new-engine-ctl/dist/cli.js
          if-no-files-found: error

      - name: Summary
        if: always()
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          BASE_SHA: ${{ steps.base.outputs.base_sha || 'n/a' }}
          PROJECTS_CSV: ${{ steps.scope_data.outputs.projects_csv || 'n/a' }}
          SERVICES_CSV: ${{ steps.scope_data.outputs.services_csv || 'n/a' }}
          NX_STATUS: ${{ steps.scope_data.outputs.nx_status || 'n/a' }}
          REQUIRES_DOWNTIME_APPROVAL: ${{ steps.scope_data.outputs.requires_downtime_approval || 'false' }}
          DOWNTIME_SERVICE_IDS: ${{ steps.scope_data.outputs.downtime_service_ids || 'n/a' }}
        run: |
          {
            printf '%s\n' "## Main Scope"
            printf '%s\n' "- Head SHA: $HEAD_SHA"
            printf '%s\n' "- Base SHA: $BASE_SHA"
            printf '%s\n' "- Affected projects: $PROJECTS_CSV"
            printf '%s\n' "- Affected services: $SERVICES_CSV"
            printf '%s\n' "- Nx status: $NX_STATUS"
            printf '%s\n' "- Requires downtime approval: $REQUIRES_DOWNTIME_APPROVAL"
            printf '%s\n' "- Downtime-risk services: $DOWNTIME_SERVICE_IDS"
          } >> "$GITHUB_STEP_SUMMARY"

  approval:
    needs: scope
    if: needs.scope.outputs.requires_downtime_approval == 'true'
    runs-on: ubuntu-latest
    environment:
      name: zaneops-main-downtime
    steps:
      - name: Summary
        env:
          DOWNTIME_SERVICE_IDS: ${{ needs.scope.outputs.downtime_service_ids || 'n/a' }}
        run: |
          {
            printf '%s\n' "## Main Downtime Approval"
            printf '%s\n' "- Approved downtime-risk services: $DOWNTIME_SERVICE_IDS"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: [scope, approval]
    if: >-
      always() &&
      needs.scope.outputs.services_csv != '' &&
      (needs.approval.result == 'success' || needs.approval.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: zaneops-main-deploy
      cancel-in-progress: true
    outputs:
      environment_name: ${{ steps.run_deploy.outputs.environment_name }}
      environment_id: ${{ steps.run_deploy.outputs.environment_id }}
      environment_created: ${{ steps.run_deploy.outputs.environment_created }}
      requested_services_csv: ${{ steps.run_deploy.outputs.requested_services_csv }}
      deploy_services_csv: ${{ steps.run_deploy.outputs.deploy_services_csv }}
      env_override_service_ids_csv: ${{ steps.run_deploy.outputs.env_override_service_ids_csv }}
      triggered_services_csv: ${{ steps.run_deploy.outputs.triggered_services_csv }}
      skipped_services_csv: ${{ steps.run_deploy.outputs.skipped_services_csv }}
      runtime_provider_output_keys_csv: ${{ steps.run_deploy.outputs.runtime_provider_output_keys_csv }}
      runtime_provider_outputs_json: ${{ steps.run_deploy.outputs.runtime_provider_outputs_json }}
      deployments_json: ${{ steps.run_deploy.outputs.deployments_json }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: new-engine-ctl-dist
          path: apps/new-engine-ctl/dist

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Validate deploy inputs
        env:
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
          ZANEOPS_ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PRODUCTION_ENVIRONMENT_NAME: ${{ secrets.ZANEOPS_ZANE_PRODUCTION_ENVIRONMENT_NAME }}
        run: node apps/new-engine-ctl/dist/cli.js check-workflow-inputs --mode main-deploy

      - name: Run main deploy
        id: run_deploy
        env:
          SERVICES_CSV: ${{ needs.scope.outputs.services_csv }}
          REQUIRES_DOWNTIME_APPROVAL: ${{ needs.scope.outputs.requires_downtime_approval }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
          ZANEOPS_ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PRODUCTION_ENVIRONMENT_NAME: ${{ secrets.ZANEOPS_ZANE_PRODUCTION_ENVIRONMENT_NAME }}
        run: |
          downtime_args=()
          if [[ "$REQUIRES_DOWNTIME_APPROVAL" == "true" ]]; then
            downtime_args+=(--approve-downtime-risk)
          fi

          node apps/new-engine-ctl/dist/cli.js deploy-main \
            --environment-name "$ZANE_PRODUCTION_ENVIRONMENT_NAME" \
            --git-commit-sha "$HEAD_SHA" \
            --services-csv "$SERVICES_CSV" \
            "${downtime_args[@]}"

      - name: Summary
        if: always()
        env:
          ENVIRONMENT_NAME: ${{ steps.run_deploy.outputs.environment_name || 'n/a' }}
          REQUESTED_SERVICES_CSV: ${{ steps.run_deploy.outputs.requested_services_csv || 'n/a' }}
          DEPLOY_SERVICES_CSV: ${{ steps.run_deploy.outputs.deploy_services_csv || 'n/a' }}
          TRIGGERED_SERVICES_CSV: ${{ steps.run_deploy.outputs.triggered_services_csv || 'n/a' }}
          SKIPPED_SERVICES_CSV: ${{ steps.run_deploy.outputs.skipped_services_csv || 'n/a' }}
          RUNTIME_PROVIDER_OUTPUT_KEYS_CSV: ${{ steps.run_deploy.outputs.runtime_provider_output_keys_csv || 'n/a' }}
        run: |
          {
            printf '%s\n' "## Main Deploy"
            printf '%s\n' "- Environment: $ENVIRONMENT_NAME"
            printf '%s\n' "- Requested services: $REQUESTED_SERVICES_CSV"
            printf '%s\n' "- Deploy services: $DEPLOY_SERVICES_CSV"
            printf '%s\n' "- Triggered services: $TRIGGERED_SERVICES_CSV"
            printf '%s\n' "- Skipped services: $SKIPPED_SERVICES_CSV"
            printf '%s\n' "- Runtime provider outputs: $RUNTIME_PROVIDER_OUTPUT_KEYS_CSV"
          } >> "$GITHUB_STEP_SUMMARY"

  verify:
    needs: [scope, deploy]
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: new-engine-ctl-dist
          path: apps/new-engine-ctl/dist

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Validate verify inputs
        env:
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
          ZANEOPS_ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PRODUCTION_ENVIRONMENT_NAME: ${{ secrets.ZANEOPS_ZANE_PRODUCTION_ENVIRONMENT_NAME }}
        run: node apps/new-engine-ctl/dist/cli.js check-workflow-inputs --mode main-verify

      - name: Run main verify
        env:
          ENVIRONMENT_NAME: ${{ needs.deploy.outputs.environment_name || secrets.ZANEOPS_ZANE_PRODUCTION_ENVIRONMENT_NAME }}
          REQUESTED_SERVICES_CSV: ${{ needs.deploy.outputs.requested_services_csv }}
          DEPLOY_SERVICES_CSV: ${{ needs.deploy.outputs.deploy_services_csv }}
          TRIGGERED_SERVICES_CSV: ${{ needs.deploy.outputs.triggered_services_csv }}
          DEPLOYMENTS_JSON: ${{ needs.deploy.outputs.deployments_json }}
          RUNTIME_PROVIDER_OUTPUTS_JSON: ${{ needs.deploy.outputs.runtime_provider_outputs_json }}
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
          ZANEOPS_ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PRODUCTION_ENVIRONMENT_NAME: ${{ secrets.ZANEOPS_ZANE_PRODUCTION_ENVIRONMENT_NAME }}
        run: |
          node apps/new-engine-ctl/dist/cli.js verify \
            --lane main \
            --environment-name "$ENVIRONMENT_NAME" \
            --requested-services-csv "${REQUESTED_SERVICES_CSV:-}" \
            --deploy-services-csv "${DEPLOY_SERVICES_CSV:-}" \
            --triggered-services-csv "${TRIGGERED_SERVICES_CSV:-}" \
            --deployments-json-inline "${DEPLOYMENTS_JSON:-}" \
            --runtime-provider-outputs-json "${RUNTIME_PROVIDER_OUTPUTS_JSON:-{}}"

      - name: Summary
        if: always()
        env:
          ENVIRONMENT_NAME: ${{ needs.deploy.outputs.environment_name || secrets.ZANEOPS_ZANE_PRODUCTION_ENVIRONMENT_NAME || 'n/a' }}
          REQUESTED_SERVICES_CSV: ${{ needs.deploy.outputs.requested_services_csv || 'n/a' }}
          DEPLOY_SERVICES_CSV: ${{ needs.deploy.outputs.deploy_services_csv || 'n/a' }}
          TRIGGERED_SERVICES_CSV: ${{ needs.deploy.outputs.triggered_services_csv || 'n/a' }}
        run: |
          {
            printf '%s\n' "## Main Verify"
            printf '%s\n' "- Environment: $ENVIRONMENT_NAME"
            printf '%s\n' "- Requested services: $REQUESTED_SERVICES_CSV"
            printf '%s\n' "- Deploy services: $DEPLOY_SERVICES_CSV"
            printf '%s\n' "- Triggered services: $TRIGGERED_SERVICES_CSV"
          } >> "$GITHUB_STEP_SUMMARY"
