name: Storybook A11y Baseline (APCA)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts --strict-peer-dependencies --filter=@techsio/ui-kit...

      - name: Build Storybook (UI)
        run: pnpm -C libs/ui run build:storybook

      - name: Upload Storybook static
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: storybook-static
          path: libs/ui/storybook-static
          retention-days: 7
          compression-level: 6

  storybook-a11y-baseline:
    runs-on: ubuntu-latest
    needs: build-storybook
    strategy:
      fail-fast: false
      matrix:
        theme: [light, dark]
    env:
      A11Y_REPORT_FAIL_ON_VIOLATIONS: "false"
      A11Y_REPORT_WRITE_JUNIT: "true"
      A11Y_REPORT_WAIT_MS: "30000"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts --strict-peer-dependencies --filter='.' --filter='@techsio/ui-kit...'

      - name: Install Playwright browsers
        # Storybook's test runner can use a different Playwright version than
        # the workspace root. Install its exact matching browser revision.
        run: node scripts/install-storybook-playwright.mjs libs/ui install --only-shell chromium

      - name: Download Storybook static
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: storybook-static
          path: libs/ui/storybook-static

      - name: Normalize Storybook static path
        run: |
          if [ -d "libs/ui/storybook-static/libs/ui/storybook-static" ]; then
            rm -rf libs/ui/storybook-static.tmp
            mv libs/ui/storybook-static/libs/ui/storybook-static libs/ui/storybook-static.tmp
            rm -rf libs/ui/storybook-static
            mv libs/ui/storybook-static.tmp libs/ui/storybook-static
          fi

      - name: Run a11y tests (${{ matrix.theme }} theme)
        id: a11y
        continue-on-error: true
        env:
          A11Y_REPORT_OUTPUT_DIR: a11y-report/${{ matrix.theme }}
        run: |
          mkdir -p "libs/ui/a11y-report/${{ matrix.theme }}"
          python3 -m http.server 6006 --directory libs/ui/storybook-static &
          SERVER_PID=$!
          cleanup() {
            kill "${SERVER_PID}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in {1..20}; do
            if curl -sf http://127.0.0.1:6006/ >/dev/null; then
              break
            fi
            sleep 1
          done
          if ! curl -sf http://127.0.0.1:6006/ >/dev/null; then
            echo "Storybook server failed to start within timeout." >&2
            exit 1
          fi
          pnpm -C libs/ui exec test-storybook --url "http://127.0.0.1:6006/?globals=theme:${{ matrix.theme }}" --config-dir .storybook --maxWorkers 2 --testTimeout 60000

      - name: Upload baseline report (${{ matrix.theme }})
        if: always() && hashFiles(format('libs/ui/a11y-report/{0}/report.json', matrix.theme)) != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: storybook-a11y-baseline-${{ matrix.theme }}
          path: libs/ui/a11y-report/${{ matrix.theme }}/report.json
          retention-days: 30

  authorize-baseline:
    name: Verify proposed baseline matches the authorized scan
    runs-on: ubuntu-latest
    needs: storybook-a11y-baseline
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download light baseline report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: storybook-a11y-baseline-light
          path: ${{ runner.temp }}/authorized-a11y-report/light

      - name: Download dark baseline report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: storybook-a11y-baseline-dark
          path: ${{ runner.temp }}/authorized-a11y-report/dark

      - name: Verify the proposed baseline
        env:
          AUTHORIZED_BASELINE: ${{ runner.temp }}/authorized-a11y-baseline.json
          AUTHORIZED_REPORT_ROOT: ${{ runner.temp }}/authorized-a11y-report
        run: |
          node libs/ui/scripts/storybook-a11y-regression.mjs \
            --report-root "$AUTHORIZED_REPORT_ROOT" \
            --baseline "$AUTHORIZED_BASELINE" \
            --update-baseline
          if ! cmp --silent "$AUTHORIZED_BASELINE" libs/ui/a11y-baseline.json; then
            echo "::error file=libs/ui/a11y-baseline.json::The proposed accessibility baseline does not exactly match this authorized Storybook scan. Download the generated baseline artifact or regenerate it locally; do not suppress individual findings."
            exit 1
          fi
