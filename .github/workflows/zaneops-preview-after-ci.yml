name: ZaneOps Preview After CI

# Temporarily disabled. Restore the CI workflow_run trigger when re-enabling
# ZaneOps preview deployments.
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  NX_NO_CLOUD: "true"

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  scope:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      baseline_sha: ${{ steps.scope_base.outputs.base_sha }}
      baseline_complete: ${{ steps.preview_commit_state.outputs.baseline_complete }}
      projects_csv: ${{ steps.scope_data.outputs.projects_csv }}
      services_csv: ${{ steps.scope_data.outputs.services_csv }}
      nx_status: ${{ steps.scope_data.outputs.nx_status }}
      should_prepare: ${{ steps.scope_data.outputs.should_prepare }}
      requires_preview_db: ${{ steps.scope_data.outputs.requires_preview_db }}
      preview_db_service_ids: ${{ steps.scope_data.outputs.preview_db_service_ids }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build new-engine-ctl
        run: ./node_modules/.bin/nubx --node nx run new-engine-ctl:build

      - name: Resolve PR number
        id: pr
        env:
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Read preview commit state
        id: preview_commit_state
        env:
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
          ZANEOPS_ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          node apps/new-engine-ctl/dist/cli.js preview-commit-state \
            --pr-number "$PR_NUMBER"

      - name: Resolve preview scope base SHA
        id: scope_base
        env:
          LAST_DEPLOYED_COMMIT_SHA: ${{ steps.preview_commit_state.outputs.last_deployed_commit_sha }}
          PR_BASE_SHA: ${{ github.event.workflow_run.pull_requests[0].base.sha }}
        run: |
          BASE_SHA="$LAST_DEPLOYED_COMMIT_SHA"
          if [[ -z "$BASE_SHA" ]]; then
            BASE_SHA="$PR_BASE_SHA"
          fi
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Resolve preview scope
        id: scope_data
        env:
          BASE_SHA: ${{ steps.scope_base.outputs.base_sha }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          PREVIEW_BASELINE_COMPLETE: ${{ steps.preview_commit_state.outputs.baseline_complete || 'false' }}
        run: |
          node apps/new-engine-ctl/dist/cli.js scope \
            --lane preview \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --preview-baseline-complete "$PREVIEW_BASELINE_COMPLETE"

      - name: Upload new-engine-ctl artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: new-engine-ctl-dist
          path: apps/new-engine-ctl/dist/cli.js
          if-no-files-found: error

      - name: Summary
        if: always()
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          BASELINE_SHA: ${{ steps.scope_base.outputs.base_sha || 'n/a' }}
          BASELINE_COMPLETE: ${{ steps.preview_commit_state.outputs.baseline_complete || 'false' }}
          PROJECTS_CSV: ${{ steps.scope_data.outputs.projects_csv || 'n/a' }}
          SERVICES_CSV: ${{ steps.scope_data.outputs.services_csv || 'n/a' }}
          NX_STATUS: ${{ steps.scope_data.outputs.nx_status || 'n/a' }}
          SHOULD_PREPARE: ${{ steps.scope_data.outputs.should_prepare || 'false' }}
          REQUIRES_PREVIEW_DB: ${{ steps.scope_data.outputs.requires_preview_db || 'false' }}
        run: |
          {
            printf '%s\n' "## Preview Scope"
            printf '%s\n' "- PR: #$PR_NUMBER"
            printf '%s\n' "- Head SHA: $HEAD_SHA"
            printf '%s\n' "- Baseline SHA: $BASELINE_SHA"
            printf '%s\n' "- Baseline complete: $BASELINE_COMPLETE"
            printf '%s\n' "- Affected projects: $PROJECTS_CSV"
            printf '%s\n' "- Affected services: $SERVICES_CSV"
            printf '%s\n' "- Nx status: $NX_STATUS"
            printf '%s\n' "- Should prepare: $SHOULD_PREPARE"
            printf '%s\n' "- Requires preview DB: $REQUIRES_PREVIEW_DB"
          } >> "$GITHUB_STEP_SUMMARY"

  prepare:
    needs: scope
    if: needs.scope.outputs.should_prepare == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: zaneops-preview-prepare-pr-${{ needs.scope.outputs.pr_number }}
      cancel-in-progress: true
    outputs:
      preview_db_created: ${{ steps.run_prepare.outputs.preview_db_created }}
      preview_db_name: ${{ steps.run_prepare.outputs.preview_db_name }}
      preview_db_user: ${{ steps.run_prepare.outputs.preview_db_user }}
      preview_db_password: ${{ steps.run_prepare.outputs.preview_db_password }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: new-engine-ctl-dist
          path: apps/new-engine-ctl/dist

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Validate prepare inputs
        env:
          REQUIRES_PREVIEW_DB: ${{ needs.scope.outputs.requires_preview_db }}
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
        run: node apps/new-engine-ctl/dist/cli.js check-workflow-inputs --mode preview-prepare

      - name: Run preview prepare
        id: run_prepare
        env:
          PR_NUMBER: ${{ needs.scope.outputs.pr_number }}
          REQUIRES_PREVIEW_DB: ${{ needs.scope.outputs.requires_preview_db }}
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
        run: |
          node apps/new-engine-ctl/dist/cli.js prepare \
            --lane preview \
            --pr-number "$PR_NUMBER" \
            --requires-preview-db

      - name: Summary
        if: always()
        env:
          PR_NUMBER: ${{ needs.scope.outputs.pr_number }}
          REQUIRES_PREVIEW_DB: ${{ needs.scope.outputs.requires_preview_db || 'n/a' }}
          PREVIEW_DB_CREATED: ${{ steps.run_prepare.outputs.preview_db_created || 'n/a' }}
          PREVIEW_DB_NAME: ${{ steps.run_prepare.outputs.preview_db_name || 'n/a' }}
        run: |
          {
            printf '%s\n' "## Preview Prepare"
            printf '%s\n' "- PR: #$PR_NUMBER"
            printf '%s\n' "- Requires preview DB: $REQUIRES_PREVIEW_DB"
            printf '%s\n' "- Preview DB created: $PREVIEW_DB_CREATED"
            printf '%s\n' "- Preview DB name: $PREVIEW_DB_NAME"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: [scope, prepare]
    if: >-
      always() &&
      needs.scope.outputs.services_csv != '' &&
      (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: zaneops-preview-deploy-pr-${{ needs.scope.outputs.pr_number }}
      cancel-in-progress: true
    outputs:
      environment_name: ${{ steps.run_deploy.outputs.environment_name }}
      environment_id: ${{ steps.run_deploy.outputs.environment_id }}
      environment_created: ${{ steps.run_deploy.outputs.environment_created }}
      environment_ready: ${{ steps.run_deploy.outputs.environment_ready }}
      environment_warning_count: ${{ steps.run_deploy.outputs.environment_warning_count }}
      target_commit_sha: ${{ steps.run_deploy.outputs.target_commit_sha }}
      last_deployed_commit_sha: ${{ steps.run_deploy.outputs.last_deployed_commit_sha }}
      runtime_provider_output_keys_csv: ${{ steps.run_deploy.outputs.runtime_provider_output_keys_csv }}
      runtime_provider_outputs_json: ${{ steps.run_deploy.outputs.runtime_provider_outputs_json }}
      requested_services_csv: ${{ steps.run_deploy.outputs.requested_services_csv }}
      deploy_services_csv: ${{ steps.run_deploy.outputs.deploy_services_csv }}
      preview_cloned_service_ids_csv: ${{ steps.run_deploy.outputs.preview_cloned_service_ids_csv }}
      preview_excluded_service_ids_csv: ${{ steps.run_deploy.outputs.preview_excluded_service_ids_csv }}
      env_override_service_ids_csv: ${{ steps.run_deploy.outputs.env_override_service_ids_csv }}
      triggered_services_csv: ${{ steps.run_deploy.outputs.triggered_services_csv }}
      preview_random_once_secrets_json: ${{ steps.run_deploy.outputs.preview_random_once_secrets_json }}
      deployments_json: ${{ steps.run_deploy.outputs.deployments_json }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: new-engine-ctl-dist
          path: apps/new-engine-ctl/dist

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Validate deploy inputs
        env:
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
          ZANEOPS_ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PRODUCTION_ENVIRONMENT_NAME: ${{ secrets.ZANEOPS_ZANE_PRODUCTION_ENVIRONMENT_NAME }}
          PREVIEW_DB_PASSWORD: ${{ needs.prepare.outputs.preview_db_password }}
        run: node apps/new-engine-ctl/dist/cli.js check-workflow-inputs --mode preview-deploy

      - name: Run preview deploy
        id: run_deploy
        env:
          PR_NUMBER: ${{ needs.scope.outputs.pr_number }}
          TARGET_COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          SERVICES_CSV: ${{ needs.scope.outputs.services_csv }}
          PREVIEW_DB_NAME: ${{ needs.prepare.outputs.preview_db_name }}
          PREVIEW_DB_USER: ${{ needs.prepare.outputs.preview_db_user }}
          PREVIEW_DB_PASSWORD: ${{ needs.prepare.outputs.preview_db_password }}
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
          ZANEOPS_ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PRODUCTION_ENVIRONMENT_NAME: ${{ secrets.ZANEOPS_ZANE_PRODUCTION_ENVIRONMENT_NAME }}
        run: |
          node apps/new-engine-ctl/dist/cli.js deploy-preview \
            --pr-number "$PR_NUMBER" \
            --target-commit-sha "$TARGET_COMMIT_SHA" \
            --services-csv "$SERVICES_CSV" \
            --source-environment-name "$ZANE_PRODUCTION_ENVIRONMENT_NAME" \
            --preview-db-name "${PREVIEW_DB_NAME:-}" \
            --preview-db-user "${PREVIEW_DB_USER:-}" \
            --preview-db-password "${PREVIEW_DB_PASSWORD:-}"

      - name: Summary
        if: always()
        env:
          PR_NUMBER: ${{ needs.scope.outputs.pr_number }}
          ENVIRONMENT_NAME: ${{ steps.run_deploy.outputs.environment_name || 'n/a' }}
          ENVIRONMENT_CREATED: ${{ steps.run_deploy.outputs.environment_created || 'n/a' }}
          ENVIRONMENT_READY: ${{ steps.run_deploy.outputs.environment_ready || 'n/a' }}
          ENVIRONMENT_WARNING_COUNT: ${{ steps.run_deploy.outputs.environment_warning_count || '0' }}
          TARGET_COMMIT_SHA: ${{ steps.run_deploy.outputs.target_commit_sha || 'n/a' }}
          LAST_DEPLOYED_COMMIT_SHA: ${{ steps.run_deploy.outputs.last_deployed_commit_sha || 'n/a' }}
          RUNTIME_PROVIDER_OUTPUT_KEYS_CSV: ${{ steps.run_deploy.outputs.runtime_provider_output_keys_csv || 'n/a' }}
          REQUESTED_SERVICES_CSV: ${{ steps.run_deploy.outputs.requested_services_csv || 'n/a' }}
          DEPLOY_SERVICES_CSV: ${{ steps.run_deploy.outputs.deploy_services_csv || 'n/a' }}
          TRIGGERED_SERVICES_CSV: ${{ steps.run_deploy.outputs.triggered_services_csv || 'n/a' }}
        run: |
          {
            printf '%s\n' "## Preview Deploy"
            printf '%s\n' "- PR: #$PR_NUMBER"
            printf '%s\n' "- Environment: $ENVIRONMENT_NAME"
            printf '%s\n' "- Environment created: $ENVIRONMENT_CREATED"
            printf '%s\n' "- Environment ready: $ENVIRONMENT_READY"
            printf '%s\n' "- Environment warnings: $ENVIRONMENT_WARNING_COUNT"
            printf '%s\n' "- Target SHA: $TARGET_COMMIT_SHA"
            printf '%s\n' "- Last deployed SHA: $LAST_DEPLOYED_COMMIT_SHA"
            printf '%s\n' "- Runtime provider outputs: $RUNTIME_PROVIDER_OUTPUT_KEYS_CSV"
            printf '%s\n' "- Requested services: $REQUESTED_SERVICES_CSV"
            printf '%s\n' "- Deploy services: $DEPLOY_SERVICES_CSV"
            printf '%s\n' "- Triggered services: $TRIGGERED_SERVICES_CSV"
          } >> "$GITHUB_STEP_SUMMARY"

  verify:
    needs: [scope, prepare, deploy]
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: new-engine-ctl-dist
          path: apps/new-engine-ctl/dist

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Validate verify inputs
        env:
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
          ZANEOPS_ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          PREVIEW_DB_PASSWORD: ${{ needs.prepare.outputs.preview_db_password }}
          PREVIEW_RANDOM_ONCE_SECRETS_JSON: ${{ needs.deploy.outputs.preview_random_once_secrets_json }}
        run: node apps/new-engine-ctl/dist/cli.js check-workflow-inputs --mode preview-verify

      - name: Run preview verify
        env:
          ENVIRONMENT_NAME: ${{ needs.deploy.outputs.environment_name }}
          REQUESTED_SERVICES_CSV: ${{ needs.deploy.outputs.requested_services_csv }}
          DEPLOY_SERVICES_CSV: ${{ needs.deploy.outputs.deploy_services_csv }}
          TRIGGERED_SERVICES_CSV: ${{ needs.deploy.outputs.triggered_services_csv }}
          PREVIEW_CLONED_SERVICE_IDS_CSV: ${{ needs.deploy.outputs.preview_cloned_service_ids_csv }}
          PREVIEW_EXCLUDED_SERVICE_IDS_CSV: ${{ needs.deploy.outputs.preview_excluded_service_ids_csv }}
          DEPLOYMENTS_JSON: ${{ needs.deploy.outputs.deployments_json }}
          PREVIEW_DB_NAME: ${{ needs.prepare.outputs.preview_db_name }}
          PREVIEW_DB_USER: ${{ needs.prepare.outputs.preview_db_user }}
          PREVIEW_DB_PASSWORD: ${{ needs.prepare.outputs.preview_db_password }}
          PREVIEW_RANDOM_ONCE_SECRETS_JSON: ${{ needs.deploy.outputs.preview_random_once_secrets_json }}
          RUNTIME_PROVIDER_OUTPUTS_JSON: ${{ needs.deploy.outputs.runtime_provider_outputs_json }}
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
          ZANEOPS_ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
        run: |
          node apps/new-engine-ctl/dist/cli.js verify \
            --lane preview \
            --environment-name "$ENVIRONMENT_NAME" \
            --requested-services-csv "${REQUESTED_SERVICES_CSV:-}" \
            --deploy-services-csv "${DEPLOY_SERVICES_CSV:-}" \
            --triggered-services-csv "${TRIGGERED_SERVICES_CSV:-}" \
            --preview-cloned-service-ids-csv "${PREVIEW_CLONED_SERVICE_IDS_CSV:-}" \
            --preview-excluded-service-ids-csv "${PREVIEW_EXCLUDED_SERVICE_IDS_CSV:-}" \
            --deployments-json-inline "${DEPLOYMENTS_JSON:-}" \
            --preview-db-name "${PREVIEW_DB_NAME:-}" \
            --preview-db-user "${PREVIEW_DB_USER:-}" \
            --preview-db-password "${PREVIEW_DB_PASSWORD:-}" \
            --preview-random-once-secrets-json "${PREVIEW_RANDOM_ONCE_SECRETS_JSON:-}" \
            --runtime-provider-outputs-json "${RUNTIME_PROVIDER_OUTPUTS_JSON:-{}}"

      - name: Summary
        if: always()
        env:
          PR_NUMBER: ${{ needs.scope.outputs.pr_number }}
          ENVIRONMENT_NAME: ${{ needs.deploy.outputs.environment_name || 'n/a' }}
          REQUESTED_SERVICES_CSV: ${{ needs.deploy.outputs.requested_services_csv || 'n/a' }}
          DEPLOY_SERVICES_CSV: ${{ needs.deploy.outputs.deploy_services_csv || 'n/a' }}
          TRIGGERED_SERVICES_CSV: ${{ needs.deploy.outputs.triggered_services_csv || 'n/a' }}
        run: |
          {
            printf '%s\n' "## Preview Verify"
            printf '%s\n' "- PR: #$PR_NUMBER"
            printf '%s\n' "- Environment: $ENVIRONMENT_NAME"
            printf '%s\n' "- Requested services: $REQUESTED_SERVICES_CSV"
            printf '%s\n' "- Deploy services: $DEPLOY_SERVICES_CSV"
            printf '%s\n' "- Triggered services: $TRIGGERED_SERVICES_CSV"
          } >> "$GITHUB_STEP_SUMMARY"
