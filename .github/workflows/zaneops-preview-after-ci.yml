name: ZaneOps Preview After CI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: read

env:
  NX_NO_CLOUD: "true"

jobs:
  scope:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      projects_csv: ${{ steps.scope_data.outputs.projects_csv }}
      services_csv: ${{ steps.scope_data.outputs.services_csv }}
      nx_status: ${{ steps.scope_data.outputs.nx_status }}
      should_prepare: ${{ steps.scope_data.outputs.should_prepare }}
      requires_preview_db: ${{ steps.scope_data.outputs.requires_preview_db }}
      preview_db_service_ids: ${{ steps.scope_data.outputs.preview_db_service_ids }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: jdx/mise-action@v3
        with:
          install: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build new-engine-ctl
        run: pnpm exec nx run new-engine-ctl:build

      - name: Resolve PR number
        id: pr
        run: echo "number=${{ github.event.workflow_run.pull_requests[0].number }}" >> "$GITHUB_OUTPUT"

      - name: Resolve preview scope
        id: scope_data
        run: |
          node apps/new-engine-ctl/dist/cli.js scope \
            --lane preview \
            --base-sha "${{ github.event.workflow_run.pull_requests[0].base.sha }}" \
            --head-sha "${{ github.event.workflow_run.head_sha }}"

      - name: Upload new-engine-ctl artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-engine-ctl-dist
          path: apps/new-engine-ctl/dist/cli.js
          if-no-files-found: error

      - name: Summary
        if: always()
        run: |
          {
            echo "## Preview Scope"
            echo "- PR: #${{ steps.pr.outputs.number }}"
            echo "- Head SHA: ${{ github.event.workflow_run.head_sha }}"
            echo "- Affected projects: ${{ steps.scope_data.outputs.projects_csv || 'n/a' }}"
            echo "- Affected services: ${{ steps.scope_data.outputs.services_csv || 'n/a' }}"
            echo "- Nx status: ${{ steps.scope_data.outputs.nx_status || 'n/a' }}"
            echo "- Should prepare: ${{ steps.scope_data.outputs.should_prepare || 'false' }}"
            echo "- Requires preview DB: ${{ steps.scope_data.outputs.requires_preview_db || 'false' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  prepare:
    needs: scope
    if: needs.scope.outputs.should_prepare == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: zaneops-preview-prepare-pr-${{ needs.scope.outputs.pr_number }}
      cancel-in-progress: true
    outputs:
      preview_db_created: ${{ steps.run_prepare.outputs.preview_db_created }}
      preview_db_name: ${{ steps.run_prepare.outputs.preview_db_name }}
      preview_db_user: ${{ steps.run_prepare.outputs.preview_db_user }}
      preview_db_password: ${{ steps.run_prepare.outputs.preview_db_password }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/download-artifact@v4
        with:
          name: new-engine-ctl-dist
          path: apps/new-engine-ctl/dist

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate prepare inputs
        env:
          REQUIRES_PREVIEW_DB: ${{ needs.scope.outputs.requires_preview_db }}
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
        run: node apps/new-engine-ctl/dist/cli.js check-workflow-inputs --mode preview-prepare

      - name: Run preview prepare
        id: run_prepare
        env:
          PR_NUMBER: ${{ needs.scope.outputs.pr_number }}
          REQUIRES_PREVIEW_DB: ${{ needs.scope.outputs.requires_preview_db }}
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
        run: |
          node apps/new-engine-ctl/dist/cli.js prepare \
            --lane preview \
            --pr-number "$PR_NUMBER" \
            --requires-preview-db

      - name: Summary
        if: always()
        run: |
          {
            echo "## Preview Prepare"
            echo "- PR: #${{ needs.scope.outputs.pr_number }}"
            echo "- Requires preview DB: ${{ needs.scope.outputs.requires_preview_db }}"
            echo "- Preview DB created: ${{ steps.run_prepare.outputs.preview_db_created || 'n/a' }}"
            echo "- Preview DB name: ${{ steps.run_prepare.outputs.preview_db_name || 'n/a' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: [scope, prepare]
    if: >-
      always() &&
      needs.scope.outputs.services_csv != '' &&
      (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: zaneops-preview-deploy-pr-${{ needs.scope.outputs.pr_number }}
      cancel-in-progress: true
    outputs:
      environment_name: ${{ steps.run_deploy.outputs.environment_name }}
      environment_id: ${{ steps.run_deploy.outputs.environment_id }}
      environment_created: ${{ steps.run_deploy.outputs.environment_created }}
      environment_ready: ${{ steps.run_deploy.outputs.environment_ready }}
      environment_warning_count: ${{ steps.run_deploy.outputs.environment_warning_count }}
      meili_backend_key: ${{ steps.run_deploy.outputs.meili_backend_key }}
      meili_frontend_key: ${{ steps.run_deploy.outputs.meili_frontend_key }}
      meili_frontend_env_var: ${{ steps.run_deploy.outputs.meili_frontend_env_var }}
      meili_keys_provisioned: ${{ steps.run_deploy.outputs.meili_keys_provisioned }}
      requested_services_csv: ${{ steps.run_deploy.outputs.requested_services_csv }}
      deploy_services_csv: ${{ steps.run_deploy.outputs.deploy_services_csv }}
      preview_cloned_service_ids_csv: ${{ steps.run_deploy.outputs.preview_cloned_service_ids_csv }}
      preview_excluded_service_ids_csv: ${{ steps.run_deploy.outputs.preview_excluded_service_ids_csv }}
      env_override_service_ids_csv: ${{ steps.run_deploy.outputs.env_override_service_ids_csv }}
      triggered_services_csv: ${{ steps.run_deploy.outputs.triggered_services_csv }}
      preview_random_once_secrets_json: ${{ steps.run_deploy.outputs.preview_random_once_secrets_json }}
      deployments_json: ${{ steps.run_deploy.outputs.deployments_json }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: jdx/mise-action@v3
        with:
          install: true

      - uses: actions/download-artifact@v4
        with:
          name: new-engine-ctl-dist
          path: apps/new-engine-ctl/dist

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate deploy inputs
        env:
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
          ZANE_CANONICAL_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PRODUCTION_ENVIRONMENT_NAME: ${{ secrets.ZANEOPS_ZANE_PRODUCTION_ENVIRONMENT_NAME }}
          PREVIEW_DB_PASSWORD: ${{ needs.prepare.outputs.preview_db_password }}
        run: node apps/new-engine-ctl/dist/cli.js check-workflow-inputs --mode preview-deploy

      - name: Run preview deploy
        id: run_deploy
        env:
          PR_NUMBER: ${{ needs.scope.outputs.pr_number }}
          SERVICES_CSV: ${{ needs.scope.outputs.services_csv }}
          PREVIEW_DB_NAME: ${{ needs.prepare.outputs.preview_db_name }}
          PREVIEW_DB_USER: ${{ needs.prepare.outputs.preview_db_user }}
          PREVIEW_DB_PASSWORD: ${{ needs.prepare.outputs.preview_db_password }}
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
          ZANE_CANONICAL_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          ZANE_PRODUCTION_ENVIRONMENT_NAME: ${{ secrets.ZANEOPS_ZANE_PRODUCTION_ENVIRONMENT_NAME }}
        run: |
          node apps/new-engine-ctl/dist/cli.js deploy-preview \
            --pr-number "$PR_NUMBER" \
            --services-csv "$SERVICES_CSV" \
            --source-environment-name "$ZANE_PRODUCTION_ENVIRONMENT_NAME" \
            --preview-db-name "${PREVIEW_DB_NAME:-}" \
            --preview-db-user "${PREVIEW_DB_USER:-}" \
            --preview-db-password "${PREVIEW_DB_PASSWORD:-}"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Preview Deploy"
            echo "- PR: #${{ needs.scope.outputs.pr_number }}"
            echo "- Environment: ${{ steps.run_deploy.outputs.environment_name || 'n/a' }}"
            echo "- Environment created: ${{ steps.run_deploy.outputs.environment_created || 'n/a' }}"
            echo "- Environment ready: ${{ steps.run_deploy.outputs.environment_ready || 'n/a' }}"
            echo "- Environment warnings: ${{ steps.run_deploy.outputs.environment_warning_count || '0' }}"
            echo "- Meili keys provisioned: ${{ steps.run_deploy.outputs.meili_keys_provisioned || 'false' }}"
            echo "- Requested services: ${{ steps.run_deploy.outputs.requested_services_csv || 'n/a' }}"
            echo "- Deploy services: ${{ steps.run_deploy.outputs.deploy_services_csv || 'n/a' }}"
            echo "- Triggered services: ${{ steps.run_deploy.outputs.triggered_services_csv || 'n/a' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  verify:
    needs: [scope, prepare, deploy]
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/download-artifact@v4
        with:
          name: new-engine-ctl-dist
          path: apps/new-engine-ctl/dist

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate verify inputs
        env:
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
          ZANE_CANONICAL_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
          PREVIEW_DB_PASSWORD: ${{ needs.prepare.outputs.preview_db_password }}
          MEILI_BACKEND_KEY: ${{ needs.deploy.outputs.meili_backend_key }}
          MEILI_FRONTEND_KEY: ${{ needs.deploy.outputs.meili_frontend_key }}
          PREVIEW_RANDOM_ONCE_SECRETS_JSON: ${{ needs.deploy.outputs.preview_random_once_secrets_json }}
        run: node apps/new-engine-ctl/dist/cli.js check-workflow-inputs --mode preview-verify

      - name: Run preview verify
        env:
          ENVIRONMENT_NAME: ${{ needs.deploy.outputs.environment_name }}
          REQUESTED_SERVICES_CSV: ${{ needs.deploy.outputs.requested_services_csv }}
          DEPLOY_SERVICES_CSV: ${{ needs.deploy.outputs.deploy_services_csv }}
          TRIGGERED_SERVICES_CSV: ${{ needs.deploy.outputs.triggered_services_csv }}
          PREVIEW_CLONED_SERVICE_IDS_CSV: ${{ needs.deploy.outputs.preview_cloned_service_ids_csv }}
          PREVIEW_EXCLUDED_SERVICE_IDS_CSV: ${{ needs.deploy.outputs.preview_excluded_service_ids_csv }}
          DEPLOYMENTS_JSON: ${{ needs.deploy.outputs.deployments_json }}
          PREVIEW_DB_NAME: ${{ needs.prepare.outputs.preview_db_name }}
          PREVIEW_DB_USER: ${{ needs.prepare.outputs.preview_db_user }}
          PREVIEW_DB_PASSWORD: ${{ needs.prepare.outputs.preview_db_password }}
          PREVIEW_RANDOM_ONCE_SECRETS_JSON: ${{ needs.deploy.outputs.preview_random_once_secrets_json }}
          MEILI_BACKEND_KEY: ${{ needs.deploy.outputs.meili_backend_key }}
          MEILI_FRONTEND_KEY: ${{ needs.deploy.outputs.meili_frontend_key }}
          MEILI_FRONTEND_ENV_VAR: ${{ needs.deploy.outputs.meili_frontend_env_var }}
          ZANE_OPERATOR_BASE_URL: ${{ secrets.ZANEOPS_ZANE_OPERATOR_BASE_URL }}
          ZANE_OPERATOR_API_TOKEN: ${{ secrets.ZANEOPS_ZANE_OPERATOR_API_TOKEN }}
          ZANE_CANONICAL_PROJECT_SLUG: ${{ secrets.ZANEOPS_ZANE_PROJECT_SLUG }}
        run: |
          node apps/new-engine-ctl/dist/cli.js verify \
            --lane preview \
            --environment-name "$ENVIRONMENT_NAME" \
            --requested-services-csv "${REQUESTED_SERVICES_CSV:-}" \
            --deploy-services-csv "${DEPLOY_SERVICES_CSV:-}" \
            --triggered-services-csv "${TRIGGERED_SERVICES_CSV:-}" \
            --preview-cloned-service-ids-csv "${PREVIEW_CLONED_SERVICE_IDS_CSV:-}" \
            --preview-excluded-service-ids-csv "${PREVIEW_EXCLUDED_SERVICE_IDS_CSV:-}" \
            --deployments-json-inline "${DEPLOYMENTS_JSON:-}" \
            --preview-db-name "${PREVIEW_DB_NAME:-}" \
            --preview-db-user "${PREVIEW_DB_USER:-}" \
            --preview-db-password "${PREVIEW_DB_PASSWORD:-}" \
            --preview-random-once-secrets-json "${PREVIEW_RANDOM_ONCE_SECRETS_JSON:-}" \
            --meili-backend-key "${MEILI_BACKEND_KEY:-}" \
            --meili-frontend-key "${MEILI_FRONTEND_KEY:-}" \
            --meili-frontend-env-var "${MEILI_FRONTEND_ENV_VAR:-}"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Preview Verify"
            echo "- PR: #${{ needs.scope.outputs.pr_number }}"
            echo "- Environment: ${{ needs.deploy.outputs.environment_name || 'n/a' }}"
            echo "- Requested services: ${{ needs.deploy.outputs.requested_services_csv || 'n/a' }}"
            echo "- Deploy services: ${{ needs.deploy.outputs.deploy_services_csv || 'n/a' }}"
            echo "- Triggered services: ${{ needs.deploy.outputs.triggered_services_csv || 'n/a' }}"
          } >> "$GITHUB_STEP_SUMMARY"
