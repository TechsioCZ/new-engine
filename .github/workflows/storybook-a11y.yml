name: Storybook A11y (APCA)

on:
  pull_request:
    paths:
      - "libs/ui/**"
      - ".github/workflows/storybook-a11y.yml"
      - ".github/workflows/storybook-a11y-baseline.yml"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:
    inputs:
      failOnViolations:
        description: "Fail workflow when a11y violations are found"
        required: false
        default: "true"

permissions:
  actions: read
  contents: read
  pull-requests: write
  checks: write

jobs:
  detect-a11y-changes:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.changed-paths.outputs.should-run }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check changed paths
        id: changed-paths
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          should_run=false
          while IFS= read -r file; do
            case "$file" in
              .github/workflows/storybook-a11y.yml|\
              .github/workflows/storybook-a11y-baseline.yml|\
              package.json|\
              pnpm-lock.yaml|\
              libs/ui/.storybook/**|\
              libs/ui/assets/**|\
              libs/ui/package.json|\
              libs/ui/playwright.config.cts|\
              libs/ui/postcss.config.mjs|\
              libs/ui/project.json|\
              libs/ui/rslib.config.ts|\
              libs/ui/scripts/storybook-a11y*|\
              libs/ui/src/**|\
              libs/ui/stories/**|\
              libs/ui/tsconfig.json)
                should_run=true
                break
                ;;
            esac
          done < <(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")

          echo "should-run=$should_run" >> "$GITHUB_OUTPUT"
          if [ "$should_run" = "false" ]; then
            echo "No Storybook a11y-relevant paths changed; skipping Storybook build and scan." >> "$GITHUB_STEP_SUMMARY"
          fi

  storybook-a11y:
    needs: detect-a11y-changes
    if: needs.detect-a11y-changes.outputs.should-run == 'true'
    uses: TechsioCZ/storybook-addons/.github/workflows/storybook-a11y.yml@b52eaf44688051b19eb989fab7b6ab721ce1a2d1 # storybook-a11y-workflow-v0.1.9
    with:
      node-version: "24"
      pnpm-version: ""
      working-directory: libs/ui
      # Install the browser as part of the dependency step. The reusable
      # workflow's built-in "Install Playwright browsers" step (disabled below)
      # runs `playwright install --with-deps chromium`, which wedges on
      # GitHub-hosted runners: the full "Chrome for Testing" zip downloads to
      # 100% then never finishes extracting (jobs stuck 30+ min).
      # `--only-shell` fetches just the chromium-headless-shell artifact, which
      # is all the headless a11y test run needs, and avoids the stuck extract.
      # `timeout` is a safety net so a future regression fails fast instead of
      # hanging. ubuntu-latest already ships Chromium's system libs (no
      # --with-deps needed).
      install-command: pnpm install --frozen-lockfile && timeout 420 pnpm -C {{workdir}} exec playwright install --only-shell chromium
      build-command: pnpm -C {{workdir}} run build:storybook
      storybook-static-dir: storybook-static
      storybook-config-dir: .storybook
      themes: '["light","dark"]'
      globals-template: 'theme:{{theme}}'
      a11y-output-dir: a11y-report
      fail-on-violations: ${{ fromJSON(github.event.inputs.failOnViolations || vars.A11Y_REPORT_FAIL_ON_VIOLATIONS || 'false') }}
      write-junit: true
      wait-ms: 30000 # 30s based on observed Storybook startup time in CI
      test-workers: 2 # keep load stable on GitHub-hosted runners
      test-timeout: 60000 # 60s to avoid flakes in slower CI
      install-playwright: false # browser installed via install-command (without --with-deps) to avoid the apt hang
      upload-artifacts: true
      post-pr-comment: true
      baseline-workflow-path: .github/workflows/storybook-a11y-baseline.yml
      baseline-branch: master
      baseline-label: master
      baseline-artifact-prefix: storybook-a11y-baseline
