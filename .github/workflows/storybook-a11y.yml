name: Storybook A11y (APCA)

on:
  pull_request:
    paths:
      - "libs/ui/**"
      - ".github/workflows/storybook-a11y.yml"
      - ".github/workflows/storybook-a11y-baseline.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "scripts/install-storybook-playwright.mjs"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-a11y-changes:
    runs-on: ubuntu-latest
    outputs:
      baseline-changed: ${{ steps.changed-paths.outputs.baseline-changed }}
      should-run: ${{ steps.changed-paths.outputs.should-run }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check changed paths
        id: changed-paths
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "baseline-changed=false" >> "$GITHUB_OUTPUT"
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          baseline_changed=false
          should_run=false
          while IFS= read -r file; do
            case "$file" in
              libs/ui/a11y-baseline.json)
                baseline_changed=true
                should_run=true
                ;;
              .github/workflows/storybook-a11y.yml|\
              .github/workflows/storybook-a11y-baseline.yml|\
              package.json|\
              pnpm-lock.yaml|\
              scripts/install-storybook-playwright.mjs|\
              libs/ui/.storybook/**|\
              libs/ui/assets/**|\
              libs/ui/package.json|\
              libs/ui/playwright.config.cts|\
              libs/ui/postcss.config.mjs|\
              libs/ui/project.json|\
              libs/ui/rslib.config.ts|\
              libs/ui/scripts/storybook-a11y*|\
              libs/ui/src/**|\
              libs/ui/stories/**|\
              libs/ui/tsconfig.json)
                should_run=true
                ;;
            esac
          done < <(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")

          echo "baseline-changed=$baseline_changed" >> "$GITHUB_OUTPUT"
          echo "should-run=$should_run" >> "$GITHUB_OUTPUT"
          if [ "$should_run" = "false" ]; then
            echo "No Storybook a11y-relevant paths changed; skipping Storybook build and scan." >> "$GITHUB_STEP_SUMMARY"
          fi

  authorize-baseline-change:
    name: Authorize accessibility baseline change
    needs: detect-a11y-changes
    if: needs.detect-a11y-changes.outputs.baseline-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Require a successful authorized baseline workflow run
        env:
          BASELINE_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/storybook-a11y-baseline.yml/runs?event=workflow_dispatch&per_page=100" \
            --jq '.workflow_runs[] | select(.head_sha == env.BASELINE_SHA and .conclusion == "success") | .id' \
            | grep -q .; then
            echo "Baseline change authorized by a successful workflow_dispatch run at ${BASELINE_SHA}." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "::error file=libs/ui/a11y-baseline.json::Accessibility baseline changes require a successful authorized run of .github/workflows/storybook-a11y-baseline.yml at PR head SHA ${BASELINE_SHA}. Run: gh workflow run storybook-a11y-baseline.yml --ref ${HEAD_REF}"
          exit 1

  storybook-a11y:
    needs: detect-a11y-changes
    if: needs.detect-a11y-changes.outputs.should-run == 'true'
    permissions:
      actions: read
      contents: read
      pull-requests: write
      checks: write
    uses: TechsioCZ/storybook-addons/.github/workflows/storybook-a11y.yml@b52eaf44688051b19eb989fab7b6ab721ce1a2d1 # storybook-a11y-workflow-v0.1.9
    with:
      node-version: "24"
      pnpm-version: ""
      working-directory: libs/ui
      # Install the browser as part of the dependency step. The reusable
      # workflow's built-in "Install Playwright browsers" step (disabled below)
      # runs `playwright install --with-deps chromium`, which wedges on
      # GitHub-hosted runners: the full "Chrome for Testing" zip downloads to
      # 100% then never finishes extracting (jobs stuck 30+ min).
      # `--only-shell` fetches just the chromium-headless-shell artifact, which
      # is all the headless a11y test run needs, and avoids the stuck extract.
      # `timeout` is a safety net so a future regression fails fast instead of
      # hanging. ubuntu-latest already ships Chromium's system libs (no
      # --with-deps needed). Install through Storybook's own Playwright so the
      # downloaded browser revision always matches the test-runner runtime.
      # `--ignore-scripts` also skips the std `prepare` build, so build
      # @techsio/std explicitly before the Storybook build resolves its
      # dist-backed exports.
      install-command: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts --strict-peer-dependencies --filter='.' --filter='@techsio/ui-kit...' && pnpm --filter @techsio/std build && pnpm --filter @techsio/ui-kit build && node scripts/install-storybook-playwright.mjs {{workdir}} install --only-shell chromium
      build-command: pnpm -C {{workdir}} run build:storybook
      storybook-static-dir: storybook-static
      storybook-config-dir: .storybook
      themes: '["light","dark"]'
      globals-template: "theme:{{theme}}"
      a11y-output-dir: a11y-report
      # The reusable scan reports violations but cannot enforce baseline deltas.
      # A separate job below compares its artifact with the committed fingerprint baseline.
      fail-on-violations: false
      write-junit: true
      wait-ms: 30000 # 30s based on observed Storybook startup time in CI
      test-workers: 2 # keep load stable on GitHub-hosted runners
      test-timeout: 60000 # 60s to avoid flakes in slower CI
      install-playwright: false # browser installed via install-command (without --with-deps) to avoid the apt hang
      upload-artifacts: true
      post-pr-comment: true
      baseline-workflow-path: .github/workflows/storybook-a11y-baseline.yml
      baseline-branch: master
      baseline-label: master
      baseline-artifact-prefix: storybook-a11y-baseline

  a11y-regression:
    name: Accessibility regression gate
    needs:
      - authorize-baseline-change
      - detect-a11y-changes
      - storybook-a11y
    if: >-
      always() && (needs.detect-a11y-changes.result != 'success' || needs.detect-a11y-changes.outputs.should-run == 'true')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Require successful accessibility prerequisites
        env:
          AUTHORIZATION_RESULT: ${{ needs.authorize-baseline-change.result }}
          BASELINE_CHANGED: ${{ needs.detect-a11y-changes.outputs.baseline-changed }}
          DETECTION_RESULT: ${{ needs.detect-a11y-changes.result }}
          SCAN_RESULT: ${{ needs.storybook-a11y.result }}
        run: |
          if [ "$DETECTION_RESULT" != "success" ]; then
            echo "::error::Accessibility change detection did not succeed (result: $DETECTION_RESULT)."
            exit 1
          fi
          if [ "$SCAN_RESULT" != "success" ]; then
            echo "::error::The Storybook accessibility scan did not succeed (result: $SCAN_RESULT)."
            exit 1
          fi
          if [ "$BASELINE_CHANGED" = "true" ] && [ "$AUTHORIZATION_RESULT" != "success" ]; then
            echo "::error file=libs/ui/a11y-baseline.json::Accessibility baseline authorization did not succeed (result: $AUTHORIZATION_RESULT)."
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Fetch immutable base accessibility baseline
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.sha }}
          BASELINE_PATH: ${{ runner.temp }}/storybook-a11y-base/a11y-baseline.json
          AUTHORIZATION_RESULT: ${{ needs.authorize-baseline-change.result }}
          BASELINE_CHANGED: ${{ needs.detect-a11y-changes.outputs.baseline-changed }}
        run: |
          install -d -m 0755 "$(dirname "$BASELINE_PATH")"
          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          if ! git show "${BASE_SHA}:libs/ui/a11y-baseline.json" > "$BASELINE_PATH"; then
            if [ "$BASELINE_CHANGED" = "true" ] && [ "$AUTHORIZATION_RESULT" = "success" ]; then
              # Bootstrap: the base commit predates the gate. The PR's baseline
              # was already proven byte-identical to an authorized head-SHA scan
              # by the authorize-baseline-change job, so it is the only
              # trustworthy comparison base available until this PR merges.
              echo "Base commit ${BASE_SHA} has no baseline; using the authorized baseline from this PR as the bootstrap base." >> "$GITHUB_STEP_SUMMARY"
              cp libs/ui/a11y-baseline.json "$BASELINE_PATH"
            else
              echo "::error file=libs/ui/a11y-baseline.json::The base commit ${BASE_SHA} has no accessibility baseline. Bootstrap it through the authorized .github/workflows/storybook-a11y-baseline.yml workflow before enabling this gate."
              exit 1
            fi
          fi
          chmod 0444 "$BASELINE_PATH"
          chmod 0555 "$(dirname "$BASELINE_PATH")"
      - name: Download Storybook accessibility report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: storybook-a11y-report
          path: storybook-a11y-report
      - name: Reject accessibility regressions against base
        env:
          BASELINE_PATH: ${{ runner.temp }}/storybook-a11y-base/a11y-baseline.json
        run: node libs/ui/scripts/storybook-a11y-regression.mjs --report-root storybook-a11y-report --baseline "$BASELINE_PATH" --fail-on-new
