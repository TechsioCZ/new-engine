name: Medusa BE Tests After CI

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: medusa-be-tests-${{ github.event.workflow_run.event }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  preflight:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.scope.outputs.should_run }}
      head_sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout workflow head SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Determine Medusa BE test scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          head_sha="${{ github.event.workflow_run.head_sha }}"
          event_name="${{ github.event.workflow_run.event }}"
          base_sha=""

          if [[ "$event_name" == "pull_request" ]] && [[ -n "${{ github.event.workflow_run.pull_requests[0].base.sha || '' }}" ]]; then
            base_sha="${{ github.event.workflow_run.pull_requests[0].base.sha }}"
          else
            base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || git rev-list --max-parents=0 "$head_sha")"
          fi

          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"

          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          printf '%s\n' "$changed_files" > /tmp/medusa-be-test-changed-files.txt

          should_run=false
          while IFS= read -r file; do
            [[ -n "$file" ]] || continue
            case "$file" in
              apps/medusa-be/*|apps/medusa-be/**|docker-compose.e2e.yaml|docker/development/medusa-be/*|docker/development/medusa-be/**|docker/development/postgres/*|docker/development/postgres/**|docker/development/medusa-valkey/*|docker/development/medusa-valkey/**|docker/development/medusa-minio/*|docker/development/medusa-minio/**|docker/development/medusa-meilisearch/*|docker/development/medusa-meilisearch/**|scripts/e2e/*|scripts/e2e/**|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|.npmrc|tsconfig.base.json)
                should_run=true
                break
                ;;
            esac
          done < /tmp/medusa-be-test-changed-files.txt

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

      - name: Preflight summary
        if: always()
        run: |
          {
            echo "## Medusa BE Tests Preflight"
            echo "- Triggering workflow: ${{ github.event.workflow_run.name }}"
            echo "- Event: ${{ github.event.workflow_run.event }}"
            echo "- Head SHA: ${{ github.event.workflow_run.head_sha }}"
            echo "- Base SHA: ${{ steps.scope.outputs.base_sha }}"
            echo "- Ready to run: ${{ steps.scope.outputs.should_run }}"
          } >> "$GITHUB_STEP_SUMMARY"

  unit:
    name: Medusa BE Unit Tests
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout workflow head SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.head_sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Medusa BE unit tests
        run: pnpm --filter medusa-be test:unit

  module-integration:
    name: Medusa BE Module Integration Tests
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout workflow head SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.head_sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Medusa BE module integration tests
        run: pnpm --filter medusa-be test:integration:modules

  http-e2e:
    name: Medusa BE HTTP E2E Tests
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MEDUSA_E2E_PROJECT_NAME: medusa-be-e2e-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout workflow head SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.head_sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Medusa BE HTTP e2e suite
        run: bash ./scripts/e2e/medusa-be-http.sh run
