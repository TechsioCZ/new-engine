    slug: "implement-cart-and-checkout-platform-flows"
    domain: "run-cart-and-checkout-platform-flows"
    description: "Drive cart and checkout through the preset-owned flows so effective cart state, selected payment sessions, and cache sync stay coherent across the storefront."
    type: "core"
    packages:
      - "@techsio/storefront-data"
    covers:
      - "cart hooks"
      - "checkout hooks"
      - "storefront.flows.cart"
      - "storefront.flows.checkout"
