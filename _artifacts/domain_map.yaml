tensions:
  - name: "Centralization versus storefront-specific flexibility"
    skills: ["decide-app-specific-overrides-vs-shared-platform", "extend-storefront-data-for-new-backend-use-cases"]
    description: "The maintainer wants common storefront logic centralized, but each storefront still needs some local UX and DTO seams."
    implication: "An agent that optimizes only for local speed will either fork shared logic in the app or over-promote customer-specific structures into the library."
  - name: "SSR correctness versus ergonomic setup"
    skills: ["setup-storefront-platform-in-next-app", "implement-ssr-prefetch-and-query-client-boundaries"]
    description: "The simplest-looking setup often ignores request-scoped query clients, provider boundaries, or explicit subpath imports that keep SSR reliable."
    implication: "An agent that optimizes for brevity generates code that works locally but misses the real Next App Router integration contract."
  - name: "Aggressive prefetch versus predictable freshness and cancellation"
    skills: ["implement-ssr-prefetch-and-query-client-boundaries", "configure-pagination-prefetch-and-cache-policy"]
    description: "Prefetch heuristics, skip modes, and cancellation expectations pull against each other when data is already cached or routes change quickly."
    implication: "An agent that blindly optimizes for speed or freshness will either refetch too much or assume cancellation and skip semantics the platform does not guarantee."
  - name: "Low-level control versus normalized platform flows"
    skills: ["implement-cart-and-checkout-platform-flows", "decide-app-specific-overrides-vs-shared-platform"]
    description: "Direct Medusa calls offer apparent control, but the platform now encodes important cart, cache, and checkout semantics in shared flows."
    implication: "An agent that prefers low-level calls will bypass the tested flow wrappers and reintroduce subtle cart and checkout bugs."

