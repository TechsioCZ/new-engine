        status: "active"
        version_context: "Current v0.1.0 service-layer expectation."
      - mistake: "Add shared behavior without shared tests"
        mechanism: "The library now treats tests as part of the consumer-facing contract, so new shared behavior without regression coverage pushes risk back into each storefront."
        wrong_pattern: |
          // add new flow logic with no vitest coverage
        correct_pattern: |
          // add the new flow logic and pin the invariant in libs/storefront-data/tests/*
        source: "libs/storefront-data/tests/medusa.preset.test.tsx; libs/storefront-data/tests/medusa.flow.test.tsx; libs/storefront-data/zmeny.md"
