    tasks:
      - "Create and hydrate the active cart"
      - "Run shipping and payment selection"
      - "Complete checkout through canonical flow wrappers"
    failure_modes:
      - mistake: "Bypass preset-owned cart and checkout flows"
        mechanism: "The flow wrappers normalize behavior around cache sync, result shapes, and checkout orchestration, so dropping to ad-hoc mutations loses the shared contract."
        wrong_pattern: |
          await sdk.store.cart.createLineItem(cartId, payload)
          await sdk.store.cart.complete(cartId)
        correct_pattern: |
          const addToCart = storefront.flows.cart.useAddToCart()
          const completeCheckout = storefront.flows.checkout.useCompleteCheckout({ cartId })
          await addToCart.mutateAsync({ cartId, ...payload })
          await completeCheckout.mutateAsync()
