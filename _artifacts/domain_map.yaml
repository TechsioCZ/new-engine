      - mistake: "Treat the first payment session as the selected provider"
        mechanism: "Checkout now derives the active provider from the selected payment session semantics, not from whichever session happens to appear first."
        wrong_pattern: |
          const providerId = cart.payment_collection.payment_sessions?.[0]?.provider_id
        correct_pattern: |
          const providerId = resolveSelectedPaymentProviderId(cart)
