        priority: "HIGH"
        status: "active"
        version_context: "Current v0.1.0 centralization goal."
      - mistake: "Drop region and country inputs on read paths"
        mechanism: "Product and catalog services normalize region-sensitive inputs, so omitting them produces payload and cache fragmentation across storefront screens."
        wrong_pattern: |
          const listing = storefront.hooks.catalog.useCatalogProducts({
            category_id: [categoryId],
            limit: 24,
          })
        correct_pattern: |
          const listing = storefront.hooks.catalog.useCatalogProducts({
            category_id: [categoryId],
            regionId,
            countryCode,
            limit: 24,
          })
        source: "libs/storefront-data/src/catalog/hooks.ts; libs/storefront-data/src/catalog/medusa-service.ts; libs/storefront-data/src/products/medusa-service.ts"
