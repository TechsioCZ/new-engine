  - name: "Extend storefront-data for new backend use cases"
    slug: "extend-storefront-data-for-new-backend-use-cases"
    domain: "evolve-shared-platform-boundaries-across-storefronts"
    description: "Add new shared backend-facing capabilities to storefront-data without breaking preset-first composition, shared query semantics, or tested platform invariants."
    type: "core"
    packages:
      - "@techsio/storefront-data"
    covers:
      - "new domain wiring"
      - "shared query keys"
      - "service cancellation seams"
      - "tests as shared contract"
    tasks:
      - "Add a new shared Medusa-backed capability"
      - "Wire it into the preset"
      - "Protect it with shared tests and normalized query behavior"
    reference_candidates:
      - topic: "new domain extension recipe"
        reason: "Adding a shared capability requires coordinated changes across types, services, query keys, preset wiring, and tests."
    failure_modes:
      - mistake: "Add a new domain without preset wiring"
        mechanism: "The preset is the canonical composition root, so a new hook or service that lives outside it will be invisible to the intended integration path."
        wrong_pattern: |
          export const useInventory = createInventoryHooks({ service, queryKeyNamespace: "shop" })
        correct_pattern: |
          export const storefront = createMedusaStorefrontPreset({
            sdk,
            inventory: { serviceOverrides },
          })
        source: "libs/storefront-data/src/medusa/preset.ts; libs/storefront-data/zmeny.md"
        priority: "HIGH"
        status: "active"
        version_context: "Current v0.1.0 preset-first extension model."
      - mistake: "Hardcode query keys in a new shared domain"
        mechanism: "Shared domains must participate in normalized key generation or they will drift from the rest of the platform's invalidation and cache matching behavior."
        wrong_pattern: |
          const queryKey = ["storefront", "inventory", params]
        correct_pattern: |
          const queryKey = createQueryKey(namespace, "inventory", "list", params)
        source: "libs/storefront-data/src/shared/query-keys.ts; libs/storefront-data/AGENTS.md"
        priority: "CRITICAL"
        status: "active"
        version_context: "Current v0.1.0 query-key rules."
      - mistake: "Accept AbortSignal but never forward it"
        mechanism: "TanStack Query passes a signal into query functions, so shared services that accept it but drop it create fake cancellation support."
        wrong_pattern: |
          async function getInventory(params, signal) {
            return sdk.store.product.list(params)
          }
        correct_pattern: |
          async function getInventory(params, signal) {
            return sdk.client.fetch({ method: "GET", path: "/store/inventory", query: params, signal })
          }
        source: "C:/Users/pisez/.local/share/tanstack-query/query/docs/framework/react/guides/query-cancellation.md; libs/storefront-data/src/orders/medusa-service.ts"
