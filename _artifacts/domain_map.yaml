  - from: 'app-token-overrides'
    to: 'component-authoring'
    reason: 'When app-level token layers cannot express the design cleanly, the next move is often to add a shared token or variant in libs/ui.'

  - from: 'existing-app-refactor-review'
    to: 'app-token-overrides'
    reason: 'Existing app findings often collapse into semantic, typography, spacing, or component override cleanup.'

  - from: 'existing-app-refactor-review'
    to: 'component-usage-ux'
    reason: 'A refactor review has to distinguish wrong component choice or ignored props from purely visual drift.'

  - from: 'existing-app-refactor-review'
    to: 'component-authoring'
    reason: 'Repeated anti-patterns across an app can reveal a real shared-library gap instead of a local cleanup task.'

