library:
  name: '@techsio/ui-kit'
  version: '0.3.2'
  repository: 'https://github.com/NMIT-WR/new-engine/tree/master/libs/ui'
  description: 'React 19 + Tailwind v4 + Zag.js UI component library with tokenized atoms, molecules, organisms, templates, and Storybook docs.'
  primary_framework: 'React'

domains:
  - name: 'adopting the ui kit in an app'
    slug: 'adopting-ui-kit-in-apps'
    description: 'Reason about which existing components, variants, and token overrides an app should use without rewriting component appearance in JSX.'

  - name: 'authoring ui-kit components'
    slug: 'authoring-ui-kit-components'
    description: 'Create or extend tokenized atoms, molecules, organisms, and templates inside libs/ui, including Zag-backed interaction patterns.'

  - name: 'verifying component contracts'
    slug: 'verifying-component-contracts'
    description: 'Keep implementation, tokens, stories, and validation workflows aligned so component behavior and docs do not drift.'

skills:
  - name: 'App component inventory'
    slug: 'app-component-inventory'
    domain: 'adopting-ui-kit-in-apps'
    description: 'Map a new app design to the existing @techsio/ui-kit component surface and narrow the inventory to the variants, themes, sizes, and props the app actually needs.'
    type: 'lifecycle'
    packages:
      - '@techsio/ui-kit'
    covers:
      - 'atoms, molecules, organisms, and templates already exported by the package'
      - 'Storybook examples that reveal supported variants and composition patterns'
      - 'variant, theme, size, and prop surface planning before app implementation starts'
      - 'threshold between reuse, app-level override, and a genuinely repeatable new shared component'
    tasks:
      - 'Audit a new design and decide which existing ui-kit components cover it'
      - 'List only the component variants/themes/sizes that the target app really needs'
      - 'Flag where the design can be satisfied by token remapping versus a library API gap'
      - 'Reserve new shared components for repeated higher-order patterns that are likely to appear across multiple apps'
    failure_modes:
      - mistake: 'Inventing a new component for every design difference'
        mechanism: 'The library already exposes reusable atoms/molecules, but an agent can mirror the design literally and bypass the shared component surface.'
        wrong_pattern: |
          export function CheckoutPrimaryButton(props) {
            return <button className="rounded-xl bg-[#113355] px-4 py-3 text-white" {...props} />
          }
        correct_pattern: |
          <Button variant="primary" theme="solid" size="md">
            Pay now
          </Button>
        source: 'maintainer interview + README.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current 0.3.x library expects app teams to reuse ui-kit components first.'
      - mistake: 'Planning the whole library surface instead of the app surface'
        mechanism: 'The maintainer wants the app inventory reduced to the exact variants/themes/sizes actually needed, not a catalog of everything Button or Dialog can do.'
        wrong_pattern: |
          const requiredButtonSurface = [
            ['primary', 'solid'],
            ['secondary', 'solid'],
            ['tertiary', 'solid'],
            ['warning', 'light'],
            ['danger', 'borderless'],
          ]
        correct_pattern: |
          const requiredButtonSurface = [
            ['primary', 'solid'],
            ['secondary', 'solid'],
            ['primary', 'outlined'],
          ]
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current workflow emphasizes app-specific minimization over exposing every variant.'
      - mistake: 'Encoding design decisions directly in JSX className'
        mechanism: 'App planning should identify reusable component + token work, but an agent can collapse the inventory into one-off utility overrides.'
        wrong_pattern: |
          <Button className="bg-brand-500 text-white text-[14.5px]">
            Continue
          </Button>
        correct_pattern: |
          <Button variant="primary">Continue</Button>
          /* then map the app tokens in CSS */
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Token-first, className-last is a maintainer-level rule for app adoption.'
    compositions:
      - library: 'Figma or other design source'
        skill: 'app-component-inventory'

  - name: 'Existing app refactor review'
    slug: 'existing-app-refactor-review'
    domain: 'adopting-ui-kit-in-apps'
    description: 'Audit an app that already uses @techsio/ui-kit, classify adoption problems, and propose a phased refactor that moves appearance out of JSX and back into props, tokens, and consistent composition.'
    type: 'lifecycle'
    packages:
      - '@techsio/ui-kit'
    covers:
      - 'existing app code that already imports and uses ui-kit components'
      - 'inline className and hardcoded utility usage that should collapse into props or app token files'
      - 'redundant or misplaced app token overrides'
      - 'native elements or ad hoc composition that bypass the shared ui-kit surface'
      - 'triage between app-local cleanup and a real repeated shared-library gap'
    tasks:
      - 'Review an existing app and classify where ui-kit adoption drifted'
      - 'Separate acceptable layout className usage from appearance styling that belongs in tokens'
      - 'Find cases where the app ignores existing component props and works around them in JSX'
      - 'Propose a phased refactor order instead of a risky all-at-once rewrite'
      - 'Escalate only repeated or systemic gaps back into libs/ui'
    failure_modes:
      - mistake: 'Treating every className as equally wrong'
        mechanism: 'The maintainer allows inline className for layout and composition, so an audit that tries to delete all classes will produce noisy, low-value refactors.'
        wrong_pattern: |
          <Button className="w-full justify-center bg-warning text-black">
            Continue
          </Button>
        correct_pattern: |
          <Button block className="justify-center">
            Continue
          </Button>
          /* move the appearance back into app tokens */
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current rule is token-first, className-last, not className-never.'
      - mistake: 'Refactoring around an existing prop or variant'
        mechanism: 'A recurring maintainer complaint is that contributors miss supported props such as block, uppercase, size, theme, or existing subcomponent APIs and patch the result with JSX styling.'
        wrong_pattern: |
          <Button className="w-full uppercase">
            Checkout
          </Button>
        correct_pattern: |
          <Button block uppercase>
            Checkout
          </Button>
        source: 'maintainer interview + src/atoms/button.tsx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Existing component APIs should be exhausted before proposing refactor churn.'
      - mistake: 'Jumping to component-specific overrides before simplifying the token chain'
        mechanism: 'An existing app can accumulate `_app-<component>.css` overrides that are no longer needed because semantic, typography, or spacing layers already solve the problem.'
        wrong_pattern: |
          @theme static {
            --color-button-fg-primary: var(--brand-fg-primary);
          }
        correct_pattern: |
          @theme static {
            --color-fg-primary: var(--brand-fg-primary);
          }
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current maintainer rule is to use component-specific overrides only when the general layers are insufficient.'
      - mistake: 'Leaving native elements or ad hoc wrappers where ui-kit already has a primitive'
        mechanism: 'Existing apps often grow local buttons, inputs, or checkbox wrappers even though the design system already has tokenized primitives and stories for them.'
        wrong_pattern: |
          <button className="rounded-md bg-primary px-4 py-2 text-white">
            Save
          </button>
        correct_pattern: |
          <Button variant="primary">Save</Button>
        source: 'AGENTS.md + maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'The design system expects app code to reuse shared primitives instead of drifting to native controls.'
    compositions:
      - library: 'target app code'
        skill: 'existing-app-refactor-review'

  - name: 'App token overrides'
    slug: 'app-token-overrides'
    domain: 'adopting-ui-kit-in-apps'
    description: 'Map an app design into app-level semantic/typography/spacing overrides first, and only introduce component-specific overrides when the default token chain is insufficient.'
    type: 'core'
    packages:
      - '@techsio/ui-kit'
    covers:
      - 'semantic token remapping for brand colors and surfaces'
      - 'typography and spacing normalization for app-specific design inputs'
      - 'last-resort component override files when general token layers are not enough'
      - 'an app override folder structure that mirrors libs/ui/src/tokens'
    tasks:
      - 'Build _app-semantic.css, _app-typography.css, and _app-spacing.css from the target design'
      - 'Decide whether a component-specific app token override is truly necessary'
      - 'Remove appearance-related inline className fixes from component usage'
    reference_candidates:
      - topic: 'two-layer token naming and derivation rules'
        reason: 'Semantic tokens, component reference tokens, and derived state tokens are spread across many CSS files and naming conventions.'
    failure_modes:
      - mistake: 'Fixing component appearance inline in JSX'
        mechanism: 'The maintainer explicitly wants appearance decisions centralized in app token files, not repeated through per-usage classes.'
        wrong_pattern: |
          <Button className="bg-warning text-black border-yellow-500">
            Continue
          </Button>
        correct_pattern: |
          <Button variant="primary">Continue</Button>
          /* map the desired colors in _app-semantic.css or _app-button.css */
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Applies to current app adoption workflow around @techsio/ui-kit.'
      - mistake: 'Creating _app-component.css overrides before checking the semantic layer'
        mechanism: 'If the existing token chain already resolves correctly after semantic/typography/spacing remapping, a component override is redundant and increases drift.'
        wrong_pattern: |
          @theme static {
            --color-button-fg-outlined-secondary: var(--brand-fg-primary);
          }
        correct_pattern: |
          @theme static {
            --color-fg-primary: var(--brand-fg-primary);
          }
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current maintainer rule: component overrides only when the general layer is insufficient.'
      - mistake: 'Treating a token gap as a permanent app-local hack'
        mechanism: 'When the token system cannot express the design cleanly, the correct long-term move is to identify an API/token gap in libs/ui rather than keep a forever override or className workaround.'
        wrong_pattern: |
          <Button className="rounded-none border-0 text-warning">
            Delete
          </Button>
        correct_pattern: |
          /* record an app-local stopgap only if unavoidable, then add the missing token or variant to libs/ui */
          <Button variant="danger">Delete</Button>
        source: 'maintainer interview + AGENTS.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Maintainer wants app-specific hacks to collapse back into shared API when repeated.'
    compositions:
      - library: 'app token files'
        skill: 'app-token-overrides'

  - name: 'Component usage UX'
    slug: 'component-usage-ux'
    domain: 'adopting-ui-kit-in-apps'
    description: 'Choose the right ui-kit component and the right variant/theme/size/props for the intended UX instead of selecting purely by visual similarity.'
    type: 'core'
    packages:
      - '@techsio/ui-kit'
    covers:
      - 'when to use a given component versus another one'
      - 'semantic meaning of variants, themes, sizes, and status props'
      - 'destructive actions, helper affordances, and dialog/tooltip/popover selection'
      - 'existing component props that should be preferred over ad hoc className adjustments'
    tasks:
      - 'Pick the correct component for a UX problem'
      - 'Choose variants/themes/sizes that match the interaction intent'
      - 'Explain when not to use a component or a specific variant'
      - 'Check existing props and API before reaching for inline className'
    failure_modes:
      - mistake: 'Using a Dialog for lightweight contextual help'
        mechanism: 'Dialog is a heavier interaction pattern than Tooltip or Popover, and selecting it by appearance alone creates unnecessary interruption and focus management.'
        wrong_pattern: |
          <Dialog triggerText="What is VAT?">
            <p>VAT is value-added tax.</p>
          </Dialog>
        correct_pattern: |
          <Tooltip content="VAT is value-added tax.">
            <Button theme="borderless">What is VAT?</Button>
          </Tooltip>
        source: 'stories/molecules/dialog.stories.tsx + src/atoms/tooltip.tsx + maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current Storybook examples distinguish dialog-scale and tooltip-scale affordances.'
      - mistake: 'Using danger styling for a non-destructive primary action'
        mechanism: 'The maintainer wants component variants interpreted by UX meaning, not just by which color happens to resemble the design.'
        wrong_pattern: |
          <Button variant="danger">Continue to payment</Button>
        correct_pattern: |
          <Button variant="primary">Continue to payment</Button>
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Danger is explicitly called out by the maintainer as a semantic UX decision.'
      - mistake: 'Using alertdialog semantics without modal safeguards'
        mechanism: 'Alert dialogs are for disruptive or destructive confirmation flows; letting them dismiss like a casual modal weakens the UX contract.'
        wrong_pattern: |
          <Dialog role="alertdialog" behavior="modeless" closeOnEscape>
            <p>Delete account?</p>
          </Dialog>
        correct_pattern: |
          <Dialog
            role="alertdialog"
            behavior="modal"
            closeOnEscape={false}
            closeOnInteractOutside={false}
          >
            <p>Delete account?</p>
          </Dialog>
        source: 'stories/molecules/dialog.stories.tsx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current dialog stories document the destructive alertdialog pattern.'
      - mistake: 'Ignoring an existing prop and compensating with className'
        mechanism: 'A recurring maintainer complaint is that contributors miss an existing component prop or size/theme option and patch the result with inline classes instead.'
        wrong_pattern: |
          <Button className="w-full uppercase">
            Checkout
          </Button>
        correct_pattern: |
          <Button block uppercase>
            Checkout
          </Button>
        source: 'maintainer interview + src/atoms/button.tsx'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current components often already expose props that should be preferred over ad hoc styling.'

  - name: 'Component authoring'
    slug: 'component-authoring'
    domain: 'authoring-ui-kit-components'
    description: 'Create or extend ui-kit components with tv(), component token classes, matching token CSS, Storybook coverage, and Zag patterns where interaction complexity requires it.'
    type: 'core'
    packages:
      - '@techsio/ui-kit'
    covers:
      - 'atoms, molecules, organisms, and templates in src/'
      - 'component token files under src/tokens/components/**'
      - 'compound component, context, and Zag-backed authoring patterns'
      - 'validation scripts that police token definitions and token usage'
      - 'AGENTS.md canonical authoring rules such as type aliases, naming consistency, and token-first styling'
    tasks:
      - 'Create a new atom, molecule, organism, or template'
      - 'Decide whether a component should be compound and whether it should use Zag.js'
      - 'Add or adjust component tokens and matching stories for the new surface area'
      - 'Keep new code consistent with AGENTS.md even when older nearby files have not been migrated yet'
    subsystems:
      - name: 'atoms'
        package: '@techsio/ui-kit'
        config_surface: 'single-element or low-complexity components driven mainly by tv() variants and token classes'
      - name: 'molecules'
        package: '@techsio/ui-kit'
        config_surface: 'compound or stateful components that often wrap Zag machines and expose subcomponents'
      - name: 'organisms'
        package: '@techsio/ui-kit'
        config_surface: 'larger compositions that share context, responsive behavior, and multiple slots'
      - name: 'templates'
        package: '@techsio/ui-kit'
        config_surface: 'higher-level composition helpers built on top of lower-level components'
    reference_candidates:
      - topic: 'Zag-backed compound component patterns'
        reason: 'Many molecules and a few atoms repeat machine/connect/context/subcomponent conventions with distinct prop surfaces.'
    failure_modes:
      - mistake: 'Styling a component with semantic tokens or arbitrary values directly'
        mechanism: 'The canonical library rule is to style components through component-specific token classes so app theming and validation remain coherent.'
        wrong_pattern: |
          const button = tv({
            base: 'bg-primary text-white rounded-[12px]'
          })
        correct_pattern: |
          const button = tv({
            base: 'bg-button-bg-primary text-button-fg-primary rounded-button-md'
          })
        source: 'AGENTS.md + README.md'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Current library conventions forbid direct semantic classes in component implementation.'
      - mistake: 'Skipping the established Zag/context pattern for interactive components'
        mechanism: 'State-heavy components in this repo use machine + connect + context + subcomponents; replacing that with ad hoc local state breaks consistency and accessibility expectations.'
        wrong_pattern: |
          export function Select({ items }) {
            return <select>{items.map((item) => <option key={item.value}>{item.label}</option>)}</select>
          }
        correct_pattern: |
          const service = useMachine(select.machine, { id, collection, ...props })
          const api = select.connect(service as select.Service, normalizeProps)
          return <SelectContext.Provider value={{ api, size, items }}>{children}</SelectContext.Provider>
        source: 'src/molecules/select.tsx + AGENTS.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current interactive components consistently rely on Zag.js patterns.'
      - mistake: 'Leaking authoring-only props to DOM or machine config'
        mechanism: 'Recent fixes show that component-specific props like buttonVariant or controlPosition can easily leak unless the authoring pattern consumes them deliberately.'
        wrong_pattern: |
          <button buttonVariant={buttonVariant} {...props} />
        correct_pattern: |
          const classes = productCardButtonVariants({ buttonVariant })
          return <Button className={classes()} {...buttonProps} />
        source: 'git history: fix(ui/product-card): prevent buttonVariant leak to DOM; fix(ui): prevent carousel controlPosition from leaking to machine config'
        priority: 'HIGH'
        status: 'fixed-but-legacy-risk'
        version_context: 'Fixed in 0.3.x, but agents trained on older code patterns can still regenerate the leak.'
      - mistake: 'Following old interface style instead of the canonical type rule'
        mechanism: 'The current source still contains older interface-based code, but the maintainer wants all new generated code to follow AGENTS.md and use type aliases.'
        wrong_pattern: |
          interface ButtonProps extends ComponentPropsWithoutRef<'button'> {
            block?: boolean
          }
        correct_pattern: |
          type ButtonProps = ComponentPropsWithoutRef<'button'> & {
            block?: boolean
          }
        source: 'AGENTS.md + maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Authoritative rule for new work is to use type aliases, even if nearby legacy code still uses interface.'
    compositions:
      - library: 'Zag.js'
        skill: 'component-authoring'

  - name: 'Component consistency'
    slug: 'component-consistency'
    domain: 'verifying-component-contracts'
    description: 'Keep component.tsx, _component.css, and *.stories.tsx aligned so variants, states, tokens, and documented usage remain truthful.'
    type: 'core'
    packages:
      - '@techsio/ui-kit'
    covers:
      - 'component implementation in src/**'
      - 'token definitions in src/tokens/components/**'
      - 'Storybook stories, controls, and usage examples'
      - 'token import aggregation in src/tokens/components/components.css'
    tasks:
      - 'Sync new variants or props across tsx, css, and stories'
      - 'Check that stories demonstrate the real public surface'
      - 'Ensure new token files are actually imported into the aggregated token bundle'
    failure_modes:
      - mistake: 'Adding a variant in TSX without adding its tokens'
        mechanism: 'tv() can reference a new token class immediately, but the component will still be incomplete until the backing CSS variables exist.'
        wrong_pattern: |
          variants: {
            theme: {
              subtle: 'bg-dialog-bg-subtle text-dialog-fg-subtle'
            }
          }
        correct_pattern: |
          @theme static {
            --color-dialog-bg-subtle: var(--color-surface);
            --color-dialog-fg-subtle: var(--color-fg-primary);
          }
        source: 'src/atoms/button.tsx + src/tokens/components/atoms/_button.css + AGENTS.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current library relies on token-backed classes rather than freeform Tailwind values.'
      - mistake: 'Changing component props or options without updating story controls'
        mechanism: 'Storybook is used as living documentation; stale argTypes or option lists mislead maintainers and downstream agents about the real public API.'
        wrong_pattern: |
          argTypes: {
            size: { options: ['sm', 'md'] }
          }
        correct_pattern: |
          argTypes: {
            size: { options: ['sm', 'md', 'lg', 'current'] }
          }
        source: 'src/atoms/button.tsx + stories/atoms/button.stories.tsx + git history with repeated story fixes'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Story drift is a recurring maintenance concern in current 0.3.x history.'
      - mistake: 'Documenting components with native HTML and hardcoded Tailwind values'
        mechanism: 'The canonical Storybook rule is to use library components and tokenized classes in stories, otherwise the docs stop reflecting the actual design system contract.'
        wrong_pattern: |
          <button className="bg-red-500 px-4 py-2">Danger</button>
        correct_pattern: |
          <Button variant="danger">Danger</Button>
        source: 'AGENTS.md + git history: docs(ui): restore storybook examples; docs(ui): add token usage guidance'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current Storybook guidance explicitly forbids this drift pattern.'

  - name: 'Component audit'
    slug: 'component-audit'
    domain: 'verifying-component-contracts'
    description: 'Audit an existing component holistically across implementation, token definitions, stories, and validation scripts to find drift, dead tokens, and silent behavioral regressions.'
    type: 'lifecycle'
    packages:
      - '@techsio/ui-kit'
    covers:
      - 'validate-token-usage.js and validate-token-definitions.js'
      - 'existing component source, token files, and stories'
      - 'history-based regression clues from repeated fix commits'
    tasks:
      - 'Review a component end-to-end before refactoring or release'
      - 'Interpret token validation warnings and decide what is real versus false positive risk'
      - 'Check disabled/validation/state styling across source, tokens, and docs'
    failure_modes:
      - mistake: 'Blindly deleting every token reported as unused'
        mechanism: 'The definition validator explicitly warns that dynamic or external usage may not be detected, so its output is not a license for automatic deletion; some values may come from runtime or Zag-driven variables such as --reference-width.'
        wrong_pattern: |
          pnpm validate:tokens
          # delete every reported token immediately
        correct_pattern: |
          pnpm validate:tokens
          # then inspect dependency chains, dynamic usage, and intended external consumers before deleting
        source: 'scripts/validate-token-definitions.js + maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current validator ends with a warning about undetected dynamic or external use.'
      - mistake: 'Treating story-only usage as proof that a runtime token is valid'
        mechanism: 'Both token validation scripts ignore *.stories.tsx, so stories can document a token without proving that production components actually use it.'
        wrong_pattern: |
          // The token appears in a story, so production usage is covered.
        correct_pattern: |
          // Audit src/**/*.{ts,tsx} and token dependency chains; stories are documentation, not runtime evidence.
        source: 'scripts/validate-token-definitions.js + scripts/validate-token-usage.js'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current validators exclude stories, tests, and specs on purpose.'
      - mistake: 'Auditing only TSX and ignoring state tokens/data attributes'
        mechanism: 'Many silent regressions in this repo live in disabled, validation, hover, and open-state styling that is split across data attributes in TSX and matching tokens in CSS.'
        wrong_pattern: |
          // Audit conclusion: disabled state is handled because the prop exists.
          <Button disabled>Save</Button>
        correct_pattern: |
          // Audit also checks disabled classes and matching tokens.
          disabled:text-button-fg-disabled
          --color-button-fg-disabled: var(--color-fg-disabled);
        source: 'src/atoms/button.tsx + src/tokens/components/atoms/_button.css + git history around unified disabled state fixes'
        priority: 'HIGH'
        status: 'fixed-but-legacy-risk'
        version_context: 'Disabled-state regressions were actively fixed in the 0.2.x to 0.3.x history.'

tensions:
  - name: 'app overrides versus library API evolution'
    skills: ['app-token-overrides', 'component-authoring']
    description: 'App teams want fast local design matching, while the shared library wants repeated needs promoted into tokens or variants instead of permanent app-local hacks.'
    implication: 'An agent that sees only the app side will over-customize locally; an agent that sees only the library side will add one-off shared variants too early.'

  - name: 'visual matching versus semantic UX correctness'
    skills: ['app-component-inventory', 'component-usage-ux']
    description: 'A screen can visually resemble several existing components, but UX intent still constrains which component and variant are acceptable.'
    implication: 'An agent that optimizes for screenshot similarity can pick the wrong component or the wrong danger/alert semantics.'

  - name: 'fast implementation versus three-surface consistency'
    skills: ['component-authoring', 'component-consistency']
    description: 'Updating the TSX surface is fast, but the library contract is only complete when tokens, stories, and bundle imports are updated too.'
    implication: 'An agent that edits only the component source leaves silent drift in CSS variables, story controls, or token aggregation.'

