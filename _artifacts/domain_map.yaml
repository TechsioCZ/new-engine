  - name: "Use catalog and product read flows"
    slug: "use-catalog-and-product-read-flows"
    domain: "read-and-prefetch-storefront-data-safely"
    description: "Use the shared read-side hooks and query-option helpers for products, catalog, collections, categories, and regions instead of app-local queries."
    type: "core"
    packages:
      - "@techsio/storefront-data"
    covers:
      - "catalog hooks"
      - "product hooks"
      - "collection/category/region hooks"
      - "region-aware read inputs"
    tasks:
      - "Render product lists and detail pages"
      - "Use catalog filters with shared query options"
      - "Keep read paths region-aware"
    failure_modes:
      - mistake: "Call suspense read hooks before required params exist"
        mechanism: "Suspense variants assume required inputs already exist, so they throw during boot or routing gaps instead of waiting for params to settle."
        wrong_pattern: |
          const product = storefront.hooks.products.useSuspenseProduct({
            handle: params.handle,
            regionId,
          })
        correct_pattern: |
          const product = storefront.hooks.products.useProduct({
            handle: params.handle,
            regionId,
            enabled: Boolean(params.handle && regionId),
          })
        source: "libs/storefront-data/src/products/hooks.ts; libs/storefront-data/src/collections/hooks.ts; libs/storefront-data/src/categories/hooks.ts"
        priority: "CRITICAL"
        status: "active"
        version_context: "Current v0.1.0 suspense surface."
      - mistake: "Rebuild Medusa reads with app-local useQuery"
        mechanism: "App-local queries duplicate service contracts, normalization, and query-key rules that the preset is meant to centralize."
        wrong_pattern: |
          const products = useQuery({
            queryKey: ["products", params],
            queryFn: () => sdk.store.product.list(params),
          })
        correct_pattern: |
          const products = storefront.hooks.products.useProducts(params)
