  - name: "Implement SSR prefetch and query-client boundaries"
    slug: "implement-ssr-prefetch-and-query-client-boundaries"
    domain: "integrate-storefront-platform-into-next-app"
    description: "Prefetch with the request-scoped server query client and keep hydration keys, page inputs, and server/client boundaries aligned with the preset."
    type: "framework"
    packages:
      - "@techsio/storefront-data"
    covers:
      - "getServerQueryClient"
      - "HydrationBoundary"
      - "shared prefetch helpers"
      - "SSR request-scoped memoization"
    tasks:
      - "Prefetch in Server Components"
      - "Hydrate shared query data into client hooks"
      - "Avoid duplicate query clients and key drift"
    failure_modes:
      - mistake: "Create raw server QueryClients"
        mechanism: "A raw QueryClient bypasses the library's request-scoped helper and makes hydration behavior drift from the documented integration path."
        wrong_pattern: |
          const queryClient = new QueryClient()
          await queryClient.prefetchQuery({ queryKey, queryFn })
        correct_pattern: |
          const queryClient = getServerQueryClient()
          await queryClient.prefetchQuery({ queryKey, queryFn })
        source: "libs/storefront-data/AGENTS.md; libs/storefront-data/src/server/get-query-client.ts"
        priority: "HIGH"
        status: "active"
        version_context: "Current v0.1.0 SSR helper guidance."
      - mistake: "Assume getServerQueryClient memoizes outside RSC render"
        mechanism: "React cache() only gives request-scoped reuse during Server Component render, so route handlers and standalone utilities still create a fresh client per call."
        wrong_pattern: |
          export async function GET() {
            const a = getServerQueryClient()
            const b = getServerQueryClient()
          }
        correct_pattern: |
          export default async function Page() {
            const queryClient = getServerQueryClient()
            return <HydrationBoundary state={dehydrate(queryClient)} />
          }
        source: "libs/storefront-data/src/server/get-query-client.ts; C:/Users/pisez/.local/share/tanstack-query/query/docs/framework/react/guides/advanced-ssr.md"
        priority: "HIGH"
        status: "active"
        version_context: "Current v0.1.0 RSC-only memoization behavior."
      - mistake: "Prefetch with hand-written query keys"
        mechanism: "Manual keys drift from the preset-owned query-key factories and silently miss the hydrated client cache."
        wrong_pattern: |
          await queryClient.prefetchQuery({
            queryKey: ["shop", "products", params],
            queryFn: fetchProducts,
          })
        correct_pattern: |
          const options = storefront.hooks.products.getListQueryOptions(params)
          await queryClient.prefetchQuery(options)
        source: "libs/storefront-data/src/products/hooks.ts; libs/storefront-data/src/shared/query-keys.ts; libs/storefront-data/tests/ssr-hydration.smoke.test.tsx"
        priority: "CRITICAL"
        status: "active"
        version_context: "Current v0.1.0 hydration contract."
