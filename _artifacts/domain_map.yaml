  - name: "Migrate custom hooks to storefront-data"
    slug: "migrate-custom-hooks-to-storefront-data"
    domain: "evolve-shared-platform-boundaries-across-storefronts"
    description: "Replace app-local Medusa hooks and utilities with the preset-owned platform surface without losing storefront-specific UX or creating dual sources of truth."
    type: "lifecycle"
    packages:
      - "@techsio/storefront-data"
    covers:
      - "migration sequencing"
      - "legacy hook replacement"
      - "preset-first cutover"
      - "app-specific callback preservation"
    tasks:
      - "Replace a legacy feature block with shared hooks"
      - "Preserve storefront-specific analytics, debug, or toast behavior"
      - "Remove the old implementation after each cutover"
    failure_modes:
      - mistake: "Run legacy and shared hooks on the same screen"
        mechanism: "Parallel old and new data layers create duplicate requests, conflicting query keys, and no single source of truth for the feature being migrated."
        wrong_pattern: |
          const legacy = useLegacyProducts(params)
          const shared = storefront.hooks.products.useProducts(params)
        correct_pattern: |
          const products = storefront.hooks.products.useProducts(params)
        source: "maintainer interview; libs/storefront-data/zmeny.md"
        priority: "CRITICAL"
        status: "active"
        version_context: "Current migration guidance for v0.1.0 adopters."
      - mistake: "Port custom hooks before centralizing the preset seam"
        mechanism: "Migrating feature code before preset composition leaves query keys, default fields, storage, and adapters scattered across the app."
        wrong_pattern: |
          export const useN1Products = () => storefront.hooks.products.useProducts({})
          export const useN1Cart = () => storefront.hooks.cart.useCart({})
        correct_pattern: |
          export const storefront = createMedusaStorefrontPreset({ sdk, queryKeyNamespace: "n1" })
        source: "libs/storefront-data/README.md; maintainer interview"
        priority: "HIGH"
        status: "active"
        version_context: "Current v0.1.0 preset-first migration model."
      - mistake: "Lose storefront-specific side effects during migration"
        mechanism: "Analytics, debug hooks, and UX callbacks are often the only reason a legacy wrapper exists, so replacing it blindly can regress behavior even when data fetching works."
        wrong_pattern: |
          export const useLogin = storefront.hooks.auth.useLogin
        correct_pattern: |
          export const useLogin = (opts) =>
            storefront.hooks.auth.useLogin({
              ...opts,
              onSuccess: (...args) => {
                track("login_success")
                opts?.onSuccess?.(...args)
              },
            })
        source: "maintainer interview"
        priority: "HIGH"
        status: "active"
        version_context: "Current v0.1.0 migration expectation."
      - mistake: "Keep migrated common logic app-local after reuse is proven"
        mechanism: "Once a second storefront needs the same backend behavior, leaving it local recreates the duplication problem the migration was supposed to remove."
        wrong_pattern: |
          export const useCustomOrders = () => useQuery({ queryKey: ["n1-orders"], queryFn })
        correct_pattern: |
          // promote the repeated backend concern into storefront-data and consume it from the preset
          const orders = storefront.hooks.orders.useOrders(params)
        source: "maintainer interview"
        priority: "MEDIUM"
        status: "active"
        version_context: "Current v0.1.0 centralization goal."

  - name: "Decide app-specific overrides vs shared platform"
    slug: "decide-app-specific-overrides-vs-shared-platform"
    domain: "evolve-shared-platform-boundaries-across-storefronts"
    description: "Decide whether a behavior should stay as a thin storefront-local wrapper or be promoted into storefront-data as shared platform logic."
    type: "composition"
    packages:
      - "@techsio/storefront-data"
    covers:
      - "thin wrapper rules"
      - "customer-specific DTOs and read models"
      - "shared promotion heuristics"
      - "app-local address adapter seams"
    tasks:
      - "Wrap shared hooks with UX side effects"
      - "Keep customer-specific DTOs local"
      - "Promote repeated backend logic into the library"
    failure_modes:
      - mistake: "Create wrappers with no added behavior"
        mechanism: "A wrapper that adds no policy, UI side effect, or type translation only obscures the preset surface and signals that the app is rebuilding the platform for no reason."
