[tools]
"aqua:mikefarah/yq" = "4.45.4"
"aqua:jqlang/jq" = "1.8.1"
node = "24"

[tasks.dev]
description = "Incremental local startup after `dev:init`: resources -> meili provisioning -> backend phase -> frontend phase"
run = "mise run dev:resources && mise run dev:internal:meili:sync-env && mise run dev:backend && mise run dev:frontend"

[tasks."dev:init"]
description = "First-time local initialization: env bootstrap -> dependency install -> backend bootstrap -> admin user -> seed"
run = "bash ./scripts/dev/init-local-stack.sh"

[tasks."dev:fresh"]
description = "Fresh local restart from stopped state: down -> resources -> meili provisioning -> backend phase -> frontend phase"
run = "mise run dev:down && mise run dev:resources && mise run dev:internal:meili:sync-env && mise run dev:backend && mise run dev:frontend"

[tasks."dev:down"]
description = "Gracefully stop and remove the local compose stack"
run = "mise run dev:internal:down"

[tasks."dev:down:volumes"]
description = "Stop the local compose stack and remove named volumes"
run = "docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} down -v --remove-orphans --timeout ${COMPOSE_STOP_TIMEOUT:-60}"

[tasks."dev:resources"]
description = "Start and wait for manifest-defined shared resources"
run = "mise run dev:internal:resources:up && mise run dev:internal:resources:wait"

[tasks."dev:backend"]
description = "Run Medusa migrations, then start and wait for manifest-defined backend phase services"
run = "mise run dev:internal:backend:prepare && mise run dev:internal:backend:up && mise run dev:internal:backend:wait"

[tasks."dev:frontend"]
description = "Start and wait for manifest-defined frontend phase services"
run = "mise run dev:internal:frontend:up && mise run dev:internal:frontend:wait"

[tasks."dev:operator"]
description = "Converge medusa-db bootstrap state for current operator envs, then start operator runtime services"
run = "bash ./scripts/dev/mise-dev-helpers.sh ensure-operator-db-convergence && mise run dev:internal:operator:up && mise run dev:internal:operator:wait"

[tasks."dev:helpers:up"]
description = "Start optional local helper services: adminer and caddy"
run = "bash ./scripts/dev/mise-dev-helpers.sh local-helper up all"

[tasks."dev:helpers:down"]
description = "Stop and remove optional local helper services: adminer and caddy"
run = "bash ./scripts/dev/mise-dev-helpers.sh local-helper down all"

[tasks."dev:helpers:status"]
description = "Show optional local helper service status: adminer and caddy"
run = "bash ./scripts/dev/mise-dev-helpers.sh local-helper status all"

[tasks."dev:helper:caddy:up"]
description = "Start the local Caddy helper"
run = "bash ./scripts/dev/mise-dev-helpers.sh local-helper up caddy"

[tasks."dev:helper:caddy:down"]
description = "Stop and remove the local Caddy helper"
run = "bash ./scripts/dev/mise-dev-helpers.sh local-helper down caddy"

[tasks."dev:helper:adminer:up"]
description = "Start the local Adminer helper"
run = "bash ./scripts/dev/mise-dev-helpers.sh local-helper up adminer"

[tasks."dev:helper:adminer:down"]
description = "Stop and remove the local Adminer helper"
run = "bash ./scripts/dev/mise-dev-helpers.sh local-helper down adminer"

[tasks."dev:corepack:update"]
description = "Activate the pinned pnpm version through Corepack"
run = "COREPACK_ENABLE_DOWNLOAD_PROMPT=0 corepack install"

[tasks."dev:install"]
description = "Install workspace dependencies with pinned pnpm"
run = "COREPACK_ENABLE_DOWNLOAD_PROMPT=0 corepack install && pnpm install --frozen-lockfile"

[tasks."dev:install:fix-lock"]
description = "Repair the pnpm lockfile with pinned pnpm"
run = "COREPACK_ENABLE_DOWNLOAD_PROMPT=0 corepack install && pnpm install --fix-lockfile"

[tasks."dev:install:no-lock"]
description = "Install workspace dependencies with pinned pnpm without frozen lockfile"
run = "COREPACK_ENABLE_DOWNLOAD_PROMPT=0 corepack install && pnpm install --no-frozen-lockfile"

[tasks."dev:deps:update"]
description = "Update Medusa backend workspace dependencies with pinned pnpm"
run = "COREPACK_ENABLE_DOWNLOAD_PROMPT=0 corepack install && pnpm --filter medusa-be update --latest"

[tasks."dev:deps:update:medusa"]
description = "Update @medusajs/* packages inside the Medusa backend workspace"
run = "COREPACK_ENABLE_DOWNLOAD_PROMPT=0 corepack install && pnpm --filter medusa-be update '@medusajs/*' --latest"

[tasks."dev:deps:npkill"]
description = "Interactively clean node_modules trees with pinned pnpm"
run = "COREPACK_ENABLE_DOWNLOAD_PROMPT=0 corepack install && pnpx npkill -x -D -y"

[tasks."dev:prod"]
description = "Build and run the local production compose stack, including frontend category regeneration"
run = "bash ./scripts/dev/run-prod-stack.sh"

[tasks."dev:prod:no-cache"]
description = "Build and run the local production compose stack without Docker layer cache"
run = "bash ./scripts/dev/run-prod-stack.sh --no-cache"

[tasks."dev:medusa:user:create"]
description = "Create a Medusa admin user in the running local stack (requires EMAIL and PASSWORD)"
run = """bash -lc 'test -n \"${EMAIL:-}\" && test -n \"${PASSWORD:-}\" || { echo \"EMAIL and PASSWORD are required.\" >&2; exit 1; }; docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} exec medusa-be pnpm --filter medusa-be exec medusa user -e \"$EMAIL\" -p \"$PASSWORD\"'"""

[tasks."dev:medusa:migrate"]
description = "Run Medusa migrations against the running local stack"
run = "docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} exec medusa-be pnpm --filter medusa-be run migrate"

[tasks."dev:medusa:migration:generate"]
description = "Generate a Medusa migration in the running local stack (requires MODULE)"
run = """bash -lc 'test -n \"${MODULE:-}\" || { echo \"MODULE is required.\" >&2; exit 1; }; docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} exec medusa-be pnpm --filter medusa-be run migrate:generate-only \"$MODULE\"'"""

[tasks."dev:medusa:oas"]
description = "Generate combined Medusa OAS with backend and Symmy plugin API docs (OAS_OUT_DIR defaults to .oas/)"
run = "pnpm --dir apps/medusa-be exec medusa-oas oas --type combined --paths ./src/api ../medusa-symmy-plugin/src/api --base ../medusa-symmy-plugin/src/api/symmy.oas.base.yaml --out-dir ${OAS_OUT_DIR:-.oas/}"

[tasks."dev:medusa:minio:init"]
description = "Manually reapply the local MinIO bootstrap fallback against the running stack"
run = "bash ./scripts/dev/minio-init.sh"

[tasks."dev:medusa:meili:reseed"]
description = "Rebuild Medusa search documents in the running local stack"
run = "docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} exec medusa-be pnpm --filter medusa-be run addInitialSearchDocuments"

[tasks."dev:medusa:seed"]
description = "Seed initial Medusa data in the running local stack"
run = "docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} exec medusa-be pnpm --filter medusa-be run seedInitialData"

[tasks."dev:medusa:seed:dev-data"]
description = "Seed Medusa development data in the running local stack"
run = "docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} exec medusa-be pnpm --filter medusa-be run seedDevData"

[tasks."dev:medusa:seed:n1"]
description = "Seed N1-specific Medusa data in the running local stack"
run = "docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} exec medusa-be pnpm --filter medusa-be run seedN1"

[tasks."dev:medusa:seed:order-business-status-demo"]
description = "Seed Medusa order business status demo orders in the running local stack"
run = "docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} exec medusa-be pnpm --filter medusa-be run seedOrderBusinessStatusDemo"

[tasks."dev:medusa:seed:herbatica-promos"]
description = "Seed Herbatica with rebased promo windows (PROMO_REBASE_DAYS defaults to 30)"
run = """bash -lc 'PROMO_REBASE_DAYS_VAL="${PROMO_REBASE_DAYS:-30}"; echo "Seeding Herbatica with rebased promo windows for $PROMO_REBASE_DAYS_VAL days"; docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} exec -e HERBATICA_PROMO_REBASE_DAYS="$PROMO_REBASE_DAYS_VAL" medusa-be pnpm --filter medusa-be run seedHerbatica'"""

[tasks."dev:medusa:debug-product-count"]
description = "Debug Medusa product counts in the running local stack"
run = """bash -lc 'env_args=(); [ -z "${PUBLISHABLE_KEY:-}" ] || env_args=(-e "PUBLISHABLE_KEY=$PUBLISHABLE_KEY"); docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} exec "${env_args[@]}" medusa-be pnpm --filter medusa-be run debugProductCount'"""

[tasks."dev:medusa:analyze-product-count"]
description = "Analyze Medusa product counts in the running local stack"
run = """bash -lc 'env_args=(-e RUN_ANALYZE=1); [ -z "${PUBLISHABLE_KEY:-}" ] || env_args+=(-e "PUBLISHABLE_KEY=$PUBLISHABLE_KEY"); docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} exec "${env_args[@]}" medusa-be pnpm --filter medusa-be run debugProductCount'"""

[tasks."dev:postgres:bootstrap"]
description = "Rerun medusa-db role bootstrap against the running local stack"
run = "bash ./scripts/apply-postgres-role-bootstrap.sh"

[tasks."dev:postgres:bootstrap:verify"]
description = "Rerun medusa-db role bootstrap twice to verify idempotency"
run = "bash ./scripts/apply-postgres-role-bootstrap.sh --verify-idempotent"

[tasks."dev:postgres:grants:verify"]
description = "Verify hardened Postgres grants and search_path in the running local stack"
run = "bash ./scripts/verify-postgres-grants.sh"

[tasks."dev:postgres18:migrate"]
description = "Migrate an existing local Postgres <18 data dir into the PG18 layout"
run = "bash ./scripts/postgres18-local-migrate.sh"

[tasks."dev:postgres18:verify"]
description = "Verify migrated PG18 state against the old cluster data without deleting backups"
run = "bash ./scripts/postgres18-verify-and-finalize.sh --check-only"

[tasks."dev:postgres18:finalize"]
description = "Verify migrated PG18 state and delete the old cluster data plus migration backups"
run = "bash ./scripts/postgres18-verify-and-finalize.sh --yes"

[tasks."dev:meili:verify"]
description = "Thin local helper that checks provided Meili keys against the active CLI-managed contract"
run = "bash ./scripts/dev/verify-meili-keys.sh"

[tasks."dev:zane:main"]
description = "Simulate the active CI main lane locally against a deployed Zane target"
run = "bash ./scripts/dev/run-zane-main-lane.sh"

[tasks."dev:zane:preview"]
description = "Simulate the active CI preview lane locally against a deployed Zane target"
run = "bash ./scripts/dev/run-zane-preview-lane.sh"

[tasks."dev:zane:project:sync"]
description = "Rare-use CTL-backed Zane helper: create or sync the canonical project/services on a deployed Zane stack"
run = "bash ./scripts/dev/setup-zane-project.sh"

[tasks."dev:zane:template-db:sync"]
description = "Rare-use CTL-backed Zane helper: create or refresh the live preview template DB on a deployed Zane stack"
run = "bash ./scripts/dev/refresh-zane-template-db.sh"

[tasks."dev:biome:medusa-be"]
description = "Run Biome with writes against apps/medusa-be"
run = "COREPACK_ENABLE_DOWNLOAD_PROMPT=0 corepack install && pnpm exec biome check --write apps/medusa-be"

[tasks."test:e2e:medusa-be:http"]
description = "Start isolated Medusa BE e2e stack, run all HTTP e2e specs, then teardown"
run = "bash ./scripts/e2e/medusa-be-http.sh run"

[tasks."test:e2e:medusa-be:http:debug"]
description = "Run Medusa BE HTTP e2e specs against an isolated stack and keep containers running for debugging"
run = "MEDUSA_E2E_KEEP_STACK=1 bash ./scripts/e2e/medusa-be-http.sh run"

[tasks."test:e2e:medusa-be:http:local"]
description = "Run Medusa BE HTTP e2e specs against a local dev-target isolated stack with host-mounted dependencies"
run = "bash ./scripts/e2e/medusa-be-http-local.sh run"

[tasks."test:e2e:medusa-be:http:local:debug"]
description = "Run local dev-target Medusa BE HTTP e2e specs and keep containers/volumes for fast reruns"
run = "MEDUSA_E2E_KEEP_STACK=1 bash ./scripts/e2e/medusa-be-http-local.sh run"

[tasks."test:e2e:medusa-be:http:local:test"]
description = "Run Medusa BE HTTP e2e specs against an already-running local dev-target e2e stack"
run = "bash ./scripts/e2e/medusa-be-http-local.sh test"

[tasks."test:e2e:medusa-be:http:local:down"]
description = "Stop the local dev-target Medusa BE HTTP e2e stack while keeping volumes"
run = "MEDUSA_E2E_DOWN_VOLUMES=0 bash ./scripts/e2e/medusa-be-http-local.sh down"

[tasks."test:e2e:medusa-be:http:local:reset"]
description = "Stop the local dev-target Medusa BE HTTP e2e stack and remove volumes"
run = "MEDUSA_E2E_DOWN_VOLUMES=1 bash ./scripts/e2e/medusa-be-http-local.sh down"

[tasks."dev:internal:resources:up"]
description = "Start manifest-defined shared resource services"
hide = true
run = "docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} up -d --build $(bash ./scripts/dev/mise-dev-helpers.sh services-for-phase resources)"

[tasks."dev:internal:down"]
description = "Gracefully stop and remove compose services before stepped startup"
hide = true
run = "docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} down --remove-orphans --timeout ${COMPOSE_STOP_TIMEOUT:-60}"

[tasks."dev:internal:resources:wait"]
description = "Wait for manifest-defined shared resource services to become healthy"
hide = true
run = "bash ./scripts/dev/mise-dev-helpers.sh wait-healthy $(bash ./scripts/dev/mise-dev-helpers.sh services-for-phase resources)"

[tasks."dev:internal:meili:sync-env"]
description = "Provision Meilisearch keys and sync .env with conflict prompts"
hide = true
run = "bash ./scripts/dev/mise-dev-helpers.sh sync-meili-env"

[tasks."dev:internal:backend:up"]
description = "Start manifest-defined backend phase services"
hide = true
run = "docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} up -d --build --no-deps $(bash ./scripts/dev/mise-dev-helpers.sh services-for-phase backend)"

[tasks."dev:internal:backend:prepare"]
description = "Run Medusa DB migrations before backend startup"
hide = true
run = "docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} run --rm --build --no-deps medusa-be pnpm --filter medusa-be run migrate"

[tasks."dev:internal:backend:wait"]
description = "Wait for manifest-defined backend phase services to become healthy"
hide = true
run = "bash ./scripts/dev/mise-dev-helpers.sh wait-healthy $(bash ./scripts/dev/mise-dev-helpers.sh services-for-phase backend)"

[tasks."dev:internal:frontend:up"]
description = "Start manifest-defined frontend phase services"
hide = true
run = "docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} up -d --build --no-deps $(bash ./scripts/dev/mise-dev-helpers.sh services-for-phase frontend)"

[tasks."dev:internal:frontend:wait"]
description = "Wait for manifest-defined frontend phase services to become healthy"
hide = true
run = "bash ./scripts/dev/mise-dev-helpers.sh wait-healthy $(bash ./scripts/dev/mise-dev-helpers.sh services-for-phase frontend)"

[tasks."dev:internal:operator:up"]
description = "Start manifest-defined operator phase services"
hide = true
run = "docker compose -f docker-compose.yaml -p ${PROJECT_NAME:-new-engine} --profile operator up -d --build --no-deps $(bash ./scripts/dev/mise-dev-helpers.sh services-for-phase operator)"

[tasks."dev:internal:operator:wait"]
description = "Wait for manifest-defined operator phase services to become healthy"
hide = true
run = "COMPOSE_PROFILES=operator bash ./scripts/dev/mise-dev-helpers.sh wait-healthy $(bash ./scripts/dev/mise-dev-helpers.sh services-for-phase operator)"
